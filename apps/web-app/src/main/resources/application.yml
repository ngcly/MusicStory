spring:
  profiles:
    active: local
  threads:
    virtual:
      enabled: true


  jackson:
    date-format: yyyy-MM-dd HH:mm:ss

  #邮件配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

jwt:
  secret: ${JWT_SECRET:dev-only-change-me}
  expiration: ${JWT_EXPIRATION:3600}

#私人密钥配置
oss:
  config:
    host: ${OSS_HOST:https://oss-cn-hongkong-internal.aliyuncs.com}
    bucketName: ${OSS_BUCKET_NAME:music-story}
    accessKeyId: ${OSS_ACCESS_KEY_ID:dev-only-access-key-id}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET:dev-only-access-key-secret}
    endpoint: ${OSS_ENDPOINT:oss.ngcly.cn}

springdoc:
  packagesToScan: com.cn.controller
  pathsToMatch: /**
  show-actuator: true
  swagger-ui:
    enabled: true
