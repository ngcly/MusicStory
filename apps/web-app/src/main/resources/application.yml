server:
  port: 8070
  # 开启 gzip 压缩
  compression:
    enabled: true
  # 开启 http2 支持 只在https下起作用
  http2:
    enabled: true

spring:
  threads:
    virtual:
      enabled: true
  jpa:
    database: MYSQL
    show-sql: false
    generate-ddl: true
    hibernate:
      ddl-auto: update

  #数据源
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/music_story?serverTimezone=UTC&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driverClassName: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    # 下面为连接池的补充设置，应用到上面所有数据源中
    druid:
      # 初始化大小，最小，最大
      initialSize: 5
      minIdle: 5
      maxActive: 20
      # 配置获取连接等待超时的时间
      maxWait: 60000
      validationQuery: SELECT 1
      # 打开PSCache，并且指定每个连接上PSCache的大小
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall' 用于防火墙
      filter:
        stat:
          merge-sql: true
          db-type: mysql
          slow-sql-millis: 1000
          log-slow-sql: true
        #配置 wall filter
        wall:
          db-type: mysql
      # 合并多个DruidDataSource的监控数据
      useGlobalDataSourceStat: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss

  #邮件配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

jwt:
  secret: ${JWT_SECRET:dev-only-change-me}
  expiration: ${JWT_EXPIRATION:3600}

#私人密钥配置
oss:
  config:
    host: ${OSS_HOST:https://oss-cn-hongkong-internal.aliyuncs.com}
    bucketName: ${OSS_BUCKET_NAME:music-story}
    accessKeyId: ${OSS_ACCESS_KEY_ID:dev-only-access-key-id}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET:dev-only-access-key-secret}
    endpoint: ${OSS_ENDPOINT:oss.ngcly.cn}

springdoc:
  packagesToScan: com.cn.controller
  pathsToMatch: /**
  show-actuator: true
  swagger-ui:
    enabled: true
