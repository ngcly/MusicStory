#正式环境配置文件
server:
  port: 8070
  compression:
    enabled: true
  http2:
    enabled: true

#数据源
spring:
  jpa:
    database: MYSQL
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: update
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/music_story?serverTimezone=UTC&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driverClassName: com.mysql.cj.jdbc.Driver
