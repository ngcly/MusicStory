<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户详情</title>
</head>
<body>
 
<div th:fragment="userDetailFragment" class="space-y-6 p-4">
    <!-- Header with Avatar -->
    <div class="flex items-center space-x-4 border-b pb-4 border-gray-100 dark:border-gray-700">
        <img class="h-16 w-16 rounded-full object-cover border-2 border-primary" th:src="${user.avatar}" alt="Avatar">
        <div>
            <h3 class="text-lg font-bold text-gray-900 dark:text-white" th:text="${user.nickName}"></h3>
            <p class="text-sm text-gray-500" th:text="${user.signature != null && !user.signature.isEmpty() ? user.signature : '这家伙很懒，什么都没写~'}"></p>
        </div>
    </div>
 
    <!-- Detail Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 text-sm">
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">用户名</span>
            <span class="text-gray-800 dark:text-gray-200" th:text="${user.username}"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">真实姓名</span>
            <span class="text-gray-800 dark:text-gray-200" th:text="${user.realName != null ? user.realName : '-'}"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">性别</span>
            <span class="text-gray-800 dark:text-gray-200" th:text="${user.gender == 'MAN' ? '男' : '女'}"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">状态</span>
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium" 
                  th:classappend="${user.state == 'NORMAL' ? 'bg-green-100 text-green-800' : (user.state == 'INITIALIZE' ? 'bg-gray-100 text-gray-800' : 'bg-red-100 text-red-800')}"
                  th:text="${user.state == 'NORMAL' ? '正常' : (user.state == 'INITIALIZE' ? '禁用' : '异常')}">
            </span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">手机号</span>
            <span class="text-gray-800 dark:text-gray-200" th:text="${user.phone != null ? user.phone : '-'}"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">邮箱</span>
            <span class="text-gray-800 dark:text-gray-200" th:text="${user.email != null ? user.email : '-'}"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">生日</span>
            <span class="text-gray-800 dark:text-gray-200" th:text="${user.birthday != null ? user.birthday : '-'}"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">余额</span>
            <span class="text-gray-800 dark:text-gray-200 font-mono" th:text="'￥' + ${user.balance}"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">等级 / 积分</span>
            <span class="text-gray-800 dark:text-gray-200" th:text="'Lv.' + ${user.level} + ' / ' + ${user.credit} + ' Pt'"></span>
        </div>
        <div>
            <span class="block text-xs font-semibold text-gray-400 uppercase">所属角色</span>
            <span class="text-gray-800 dark:text-gray-200">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 mr-1"
                      th:each="role : ${user.roleList}" th:text="${role.roleName}"></span>
            </span>
        </div>
        <div class="md:col-span-2">
            <span class="block text-xs font-semibold text-gray-400 uppercase">个人简介</span>
            <p class="text-gray-700 dark:text-gray-300 mt-1" th:text="${user.personDesc != null && !user.personDesc.isEmpty() ? user.personDesc : '暂无简介。'}"></p>
        </div>
    </div>
</div>
 
</body>
</html>
