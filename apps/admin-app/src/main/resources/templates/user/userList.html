<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户列表</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen p-6"
      x-data="{ openDetail: false, openEdit: false }">
 
<!-- Top Navigation Bar -->
<div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-800 pb-4 mb-6">
    <nav class="flex" aria-label="Breadcrumb">
        <ol class="inline-flex items-center space-x-1 md:space-x-3">
            <li class="inline-flex items-center text-gray-500">音书管理</li>
            <li>
                <div class="flex items-center">
                    <svg class="w-3 h-3 text-gray-400 mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
                    </svg>
                    <span class="ml-1 text-sm font-semibold text-gray-800 dark:text-white">用户列表</span>
                </div>
            </li>
        </ol>
    </nav>
    <button class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-500" 
            onclick="location.reload()" title="刷新">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
    </button>
</div>
 
<!-- Search Row -->
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 mb-6">
    <form id="search-form" hx-get="/ms/user.html" hx-target="#userTableContainer" hx-swap="outerHTML" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">用户名</label>
            <input type="text" name="username" th:value="${userParam != null ? userParam.username : ''}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">昵称</label>
            <input type="text" name="nickName" th:value="${userParam != null ? userParam.nickName : ''}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">手机号</label>
            <input type="text" name="phone" th:value="${userParam != null ? userParam.phone : ''}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">状态</label>
            <select name="state" 
                    class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value=""></option>
                <option value="INITIALIZE" th:selected="${userParam != null && userParam.state != null && userParam.state.toString() == 'INITIALIZE'}">禁用</option>
                <option value="NORMAL" th:selected="${userParam != null && userParam.state != null && userParam.state.toString() == 'NORMAL'}">正常</option>
                <option value="LOCKED" th:selected="${userParam != null && userParam.state != null && userParam.state.toString() == 'LOCKED'}">异常</option>
            </select>
        </div>
        <div class="flex space-x-2">
            <button type="submit" class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 w-full">
                查询
            </button>
            <button type="reset" class="inline-flex justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 w-full">
                重置
            </button>
        </div>
    </form>
</div>
 
<!-- User Table Container (Fragment updated dynamically via HTMX) -->
<div id="userTableContainer" th:fragment="userTable" 
     hx-trigger="userListChanged from:body" 
     hx-get="/ms/user.html" 
     hx-include="#search-form" 
     hx-target="this" 
     hx-swap="outerHTML"
     class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
    
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-900">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">用户名</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">昵称</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">性别</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">手机号</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">邮箱</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">状态</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">注册时间</th>
                <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">操作</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700 bg-white dark:bg-gray-800">
            <tr th:each="user : ${userPage.content}" class="hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white" th:text="${user.username}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${user.nickName}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${user.gender == 'MAN' ? '男' : '女'}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${user.phone != null ? user.phone : '-'}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${user.email != null ? user.email : '-'}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                          th:classappend="${user.state == 'NORMAL' ? 'bg-green-100 text-green-800' : (user.state == 'INITIALIZE' ? 'bg-gray-100 text-gray-800' : 'bg-red-100 text-red-800')}"
                          th:text="${user.state == 'NORMAL' ? '正常' : (user.state == 'INITIALIZE' ? '禁用' : '异常')}">
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" 
                    th:text="${#temporals.format(user.createdAt,'yyyy-MM-dd HH:mm:ss')}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                    <button class="text-indigo-600 hover:text-indigo-900"
                            th:hx-get="'/ms/user/' + ${user.id}" 
                            hx-target="#detailModalContent"
                            @click="openDetail = true">
                        查看
                    </button>
                    <button class="text-indigo-600 hover:text-indigo-900"
                            th:hx-get="'/ms/user/edit.html?userId=' + ${user.id}" 
                            hx-target="#editModalContent"
                            @click="openEdit = true">
                        编辑
                    </button>
                    <button class="text-red-600 hover:text-red-900"
                            th:hx-delete="'/ms/user?userId=' + ${user.id}"
                            hx-confirm="确定删除该用户吗？"
                            hx-target="closest tr"
                            hx-swap="outerHTML"
                            th:hx-headers="'{&quot;X-CSRF-TOKEN&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
                        删除
                    </button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(userPage.content)}">
                <td colspan="8" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
                    未查找到符合条件的用户。
                </td>
            </tr>
        </tbody>
    </table>
 
    <!-- Table Pagination -->
    <div class="bg-white dark:bg-gray-800 px-4 py-3 flex items-center justify-between border-t border-gray-200 dark:border-gray-700 sm:px-6">
        <div class="flex-1 flex justify-between sm:hidden">
            <button th:if="${userPage.hasPrevious()}"
                    th:hx-get="'/ms/user.html?page=' + ${currentPage - 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#userTableContainer"
                    hx-swap="outerHTML"
                    class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                上一页
            </button>
            <button th:if="${userPage.hasNext()}"
                    th:hx-get="'/ms/user.html?page=' + ${currentPage + 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#userTableContainer"
                    hx-swap="outerHTML"
                    class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                下一页
            </button>
        </div>
        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-gray-700 dark:text-gray-300">
                    当前显示第 <span class="font-medium" th:text="${(currentPage - 1) * size + 1}"></span> 至 
                    <span class="font-medium" th:text="${(currentPage - 1) * size + userPage.numberOfElements}"></span> 条，
                    共 <span class="font-medium" th:text="${userPage.totalElements}"></span> 条记录
                </p>
            </div>
            <div>
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-1" aria-label="Pagination">
                    <!-- Prev Button -->
                    <button th:disabled="${!userPage.hasPrevious()}"
                            th:hx-get="${userPage.hasPrevious()} ? '/ms/user.html?page=' + ${currentPage - 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#userTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                        <span class="sr-only">Previous</span>
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <!-- Page Number Loop -->
                    <button th:each="pageNum : ${#numbers.sequence(1, userPage.totalPages == 0 ? 1 : userPage.totalPages)}"
                            th:hx-get="'/ms/user.html?page=' + ${pageNum} + '&size=' + ${size}"
                            hx-include="#search-form"
                            hx-target="#userTableContainer"
                            hx-swap="outerHTML"
                            th:classappend="${pageNum == currentPage} ? 'z-10 bg-indigo-55 bg-indigo-50 border-indigo-500 text-indigo-600' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'"
                            class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium"
                            th:text="${pageNum}">
                    </button>
                    <!-- Next Button -->
                    <button th:disabled="${!userPage.hasNext()}"
                            th:hx-get="${userPage.hasNext()} ? '/ms/user.html?page=' + ${currentPage + 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#userTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                        <span class="sr-only">Next</span>
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </nav>
            </div>
        </div>
    </div>
</div>
 
<!-- User Detail Modal (Alpine.js) -->
<div x-show="openDetail" 
     class="fixed inset-0 z-50 overflow-y-auto" 
     aria-labelledby="modal-title" role="dialog" aria-modal="true" style="display: none;">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <!-- Backdrop -->
        <div x-show="openDetail"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" 
             @click="openDetail = false"></div>
 
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
 
        <!-- Modal body -->
        <div x-show="openDetail"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="inline-block align-middle bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="flex items-center justify-between border-b pb-3 mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="modal-title">用户信息</h3>
                    <button class="text-gray-400 hover:text-gray-600" @click="openDetail = false">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="detailModalContent">
                    <div class="flex justify-center p-6">
                        <!-- Loading spinner -->
                        <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
 
<!-- User Edit Modal (Alpine.js) -->
<div x-show="openEdit" 
     class="fixed inset-0 z-50 overflow-y-auto" 
     aria-labelledby="modal-title" role="dialog" aria-modal="true" style="display: none;">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <!-- Backdrop -->
        <div x-show="openEdit"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" 
             @click="openEdit = false"></div>
 
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
 
        <!-- Modal body -->
        <div x-show="openEdit"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="inline-block align-middle bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="flex items-center justify-between border-b pb-3 mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="modal-title">编辑用户</h3>
                    <button class="text-gray-400 hover:text-gray-600" @click="openEdit = false">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="editModalContent">
                    <div class="flex justify-center p-6">
                        <!-- Loading spinner -->
                        <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
 
</body>
</html>
