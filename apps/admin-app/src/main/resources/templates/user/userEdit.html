<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改用户</title>
</head>
<body>
 
<div th:fragment="userEditFragment" class="p-4">
    <form hx-put="/ms/user" 
          hx-swap="none"
          class="space-y-4">
        <!-- CRSF Token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="id" th:value="${user.id}">
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">用户名</label>
            <input type="text" name="username" readonly th:value="${user.username}" 
                   class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 text-gray-500 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">用户昵称</label>
            <input type="text" name="nickName" readonly th:value="${user.nickName}" 
                   class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 text-gray-500 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">状态</label>
            <select name="state" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value="INITIALIZE" th:selected="${user.state != null && user.state.toString()=='INITIALIZE'}">禁用</option>
                <option value="NORMAL" th:selected="${user.state != null && user.state.toString()=='NORMAL'}">正常</option>
                <option value="LOCKED" th:selected="${user.state != null && user.state.toString()=='LOCKED'}">异常</option>
            </select>
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">角色分配</label>
            <div class="space-y-2">
                <div th:each="role : ${roles}" class="flex items-start">
                    <div class="flex h-5 items-center">
                        <input th:id="'role-' + ${role.id}" name="roleIds" type="checkbox" th:value="${role.id}"
                               th:checked="${checkRoleId != null && #strings.contains(checkRoleId, role.id.toString())}"
                               class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    </div>
                    <div class="ml-3 text-sm">
                        <label th:for="'role-' + ${role.id}" class="font-medium text-gray-700 dark:text-gray-200" th:text="${role.roleName}"></label>
                        <p class="text-gray-500 text-xs" th:text="${role.description}"></p>
                    </div>
                </div>
            </div>
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="button" @click="openEdit = false"
                    class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                取消
            </button>
            <button type="submit" @click="openEdit = false"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                保存
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
