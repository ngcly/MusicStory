<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>公告编辑</title>
</head>
<body>
 
<div th:fragment="noticeEditFragment" class="p-4">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4"
        th:text="${notice.id == null ? '新增公告' : '修改公告'}"></h3>
        
    <form th:hx-put="${notice.id != null} ? '/ms/notice' : null"
          th:hx-post="${notice.id == null} ? '/ms/notice' : null"
          hx-swap="none"
          class="space-y-4">
          
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" id="id" name="id" th:value="${notice.id}">
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">标题</label>
            <input type="text" name="title" th:value="${notice.title}" required
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">展示开始时间</label>
            <input type="datetime-local" name="beginTime" required
                   th:value="${notice.beginTime != null ? #temporals.format(notice.beginTime,'yyyy-MM-dd&apos;T&apos;HH:mm') : ''}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">展示结束时间</label>
            <input type="datetime-local" name="endTime" required
                   th:value="${notice.endTime != null ? #temporals.format(notice.endTime,'yyyy-MM-dd&apos;T&apos;HH:mm') : ''}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">公告内容</label>
            <textarea name="content" rows="4" required th:text="${notice.content}"
                      class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"></textarea>
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="button" @click="openEdit = false"
                    class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                取消
            </button>
            <button type="submit" @click="openEdit = false"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                    th:text="${notice.id == null ? '保存' : '修改'}">
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
