<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理员详情</title>
</head>
<body>

<div th:fragment="managerDetailFragment" class="space-y-6">
    <!-- Header with Banner and Avatar -->
    <div class="relative">
        <!-- Colorful Gradient Banner -->
        <div class="h-24 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-t-xl"></div>
        <!-- Overlapping Avatar -->
        <div class="absolute -bottom-8 left-6">
            <img class="h-20 w-20 rounded-full object-cover border-4 border-white dark:border-slate-850 shadow-md" 
                 th:src="${manager.avatar != null && !manager.avatar.isEmpty() ? manager.avatar : '/images/avatar.jpg'}" 
                 alt="Avatar">
        </div>
    </div>

    <!-- Title & Basic Info Section -->
    <div class="pt-10 px-6 pb-4 border-b border-slate-100 dark:border-slate-800/60">
        <div class="flex items-center justify-between">
            <div>
                <h3 class="text-xl font-bold text-slate-900 dark:text-slate-100" 
                    th:text="${manager.realName != null && !manager.realName.isEmpty() ? manager.realName : manager.username}"></h3>
                <p class="text-xs font-bold text-indigo-500 dark:text-indigo-400 mt-0.5" th:text="${'@' + manager.username}"></p>
            </div>
            <div>
                <!-- Status Badge -->
                <span th:if="${manager.state == 'NORMAL'}" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 dark:bg-emerald-950/30 dark:text-emerald-400 border border-emerald-250/20 dark:border-emerald-900/30">
                    <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    正常
                </span>
                <span th:if="${manager.state == 'INITIALIZE'}" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600 dark:bg-slate-800/40 dark:text-slate-400 border border-slate-200/50 dark:border-slate-700/30">
                    <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-slate-400"></span>
                    初始化
                </span>
                <span th:if="${manager.state == 'LOCKED'}" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-rose-50 text-rose-700 dark:bg-rose-950/30 dark:text-rose-400 border border-rose-250/20 dark:border-rose-900/30">
                    <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-rose-500 animate-pulse"></span>
                    封禁
                </span>
            </div>
        </div>
    </div>

    <!-- Detail Widgets Grid -->
    <div class="px-6 pb-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Username -->
            <div class="flex items-center space-x-3 bg-slate-50/50 dark:bg-slate-900/30 p-3 rounded-xl border border-slate-100 dark:border-slate-800/40">
                <div class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-950/20 text-indigo-500 dark:text-indigo-400">
                    <i class="w-4 h-4" data-lucide="user"></i>
                </div>
                <div>
                    <span class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">真实姓名</span>
                    <span class="text-sm font-semibold text-slate-800 dark:text-slate-200" th:text="${manager.realName != null ? manager.realName : '-'}"></span>
                </div>
            </div>

            <!-- Gender -->
            <div class="flex items-center space-x-3 bg-slate-50/50 dark:bg-slate-900/30 p-3 rounded-xl border border-slate-100 dark:border-slate-800/40">
                <div class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-950/20 text-indigo-500 dark:text-indigo-400">
                    <i class="w-4 h-4" data-lucide="smile"></i>
                </div>
                <div>
                    <span class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">性别</span>
                    <span class="text-sm font-semibold text-slate-800 dark:text-slate-200" th:text="${manager.gender == 'MAN' ? '男' : '女'}"></span>
                </div>
            </div>

            <!-- Birthday -->
            <div class="flex items-center space-x-3 bg-slate-50/50 dark:bg-slate-900/30 p-3 rounded-xl border border-slate-100 dark:border-slate-800/40">
                <div class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-950/20 text-indigo-500 dark:text-indigo-400">
                    <i class="w-4 h-4" data-lucide="calendar"></i>
                </div>
                <div>
                    <span class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">生日</span>
                    <span class="text-sm font-semibold text-slate-800 dark:text-slate-200" th:text="${manager.birthday != null ? manager.birthday : '-'}"></span>
                </div>
            </div>

            <!-- Empty Grid for alignment -->
            <div class="hidden md:block"></div>

            <!-- Created Time -->
            <div class="flex items-center space-x-3 bg-slate-50/50 dark:bg-slate-900/30 p-3 rounded-xl border border-slate-100 dark:border-slate-800/40">
                <div class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-950/20 text-indigo-500 dark:text-indigo-400">
                    <i class="w-4 h-4" data-lucide="clock"></i>
                </div>
                <div>
                    <span class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">创建时间</span>
                    <span class="text-xs font-semibold text-slate-850 dark:text-slate-300" th:text="${#temporals.format(manager.createdAt,'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
            </div>

            <!-- Updated Time -->
            <div class="flex items-center space-x-3 bg-slate-50/50 dark:bg-slate-900/30 p-3 rounded-xl border border-slate-100 dark:border-slate-800/40">
                <div class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-950/20 text-indigo-500 dark:text-indigo-400">
                    <i class="w-4 h-4" data-lucide="edit-3"></i>
                </div>
                <div>
                    <span class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">修改时间</span>
                    <span class="text-xs font-semibold text-slate-850 dark:text-slate-300" th:text="${#temporals.format(manager.updatedAt,'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
            </div>
        </div>

        <!-- Assigned Roles Chips -->
        <div class="bg-slate-50/50 dark:bg-slate-900/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/40">
            <span class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2 flex items-center">
                <i class="w-4 h-4 mr-1.5 text-indigo-550" data-lucide="shield"></i>
                已分配系统角色
            </span>
            <div class="flex flex-wrap gap-2">
                <span th:each="role : ${manager.roleList}" 
                      class="inline-flex items-center px-3 py-1 rounded-lg text-xs font-bold bg-indigo-50 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-400 border border-indigo-200/45 dark:border-indigo-900/40 transition-transform hover:scale-105"
                      th:text="${role.roleName}"></span>
                <span th:if="${#lists.isEmpty(manager.roleList)}" class="text-xs text-slate-400 dark:text-slate-500 italic">暂未分配系统角色</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
