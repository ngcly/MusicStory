<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
</head>
<body>
 
<div th:fragment="updatePwdFragment" class="p-6 max-w-lg mx-auto bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700"
     x-data="{ 
        password: '',
        repassword: '',
        get isMatch() { return this.password === this.repassword },
        get isValid() { return this.password.length >= 6 && this.password.length <= 12 }
     }">
     
    <div class="border-b pb-3 mb-4 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
            修改密码 - <span sec:authentication="name" class="text-indigo-650"></span>
        </h3>
    </div>
 
    <form hx-put="/sys/manager/pwd"
          hx-swap="none"
          class="space-y-4"
          @submit.prevent="if(isValid && isMatch) { $el.submit() }">
          
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
 
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">当前密码</label>
            <input type="password" name="oldPassword" required
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">新密码</label>
            <input type="password" name="password" required x-model="password"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            <span class="text-xs text-gray-400 mt-1 block">6到12个字符，且不能有空格</span>
            <span x-show="password && !isValid" class="text-xs text-red-500 mt-1 block" style="display: none;">密码长度必须在6至12位之间</span>
        </div>
 
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">确认新密码</label>
            <input type="password" name="repassword" required x-model="repassword"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            <span x-show="repassword && !isMatch" class="text-xs text-red-500 mt-1 block" style="display: none;">两次密码输入不一致</span>
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="submit" :disabled="!isValid || !isMatch"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
                确认修改
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
