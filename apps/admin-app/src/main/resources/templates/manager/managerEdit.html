<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理员编辑</title>
</head>
<body>

<div th:fragment="mainContent" class="p-2 md:p-4"
     x-data="{
        avatarUrl: '',
        initialState: '',
        isSubmitting: false,
        getIsDirty() {
            const form = this.$el.querySelector('form');
            if (!form) return false;
            const current = new FormData(form);
            const serialized = Array.from(current.entries()).map(e => e[0] + '=' + e[1]).join('&');
            return this.initialState !== serialized;
        },
        init() {
            const avatarInput = this.$el.querySelector('input[name=avatar]');
            if (avatarInput) {
                this.avatarUrl = avatarInput.value;
            }
            this.$nextTick(() => {
                const form = this.$el.querySelector('form');
                if (form) {
                    const current = new FormData(form);
                    this.initialState = Array.from(current.entries()).map(e => e[0] + '=' + e[1]).join('&');
                }
            });
        },
        uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            
            const csrfToken = document.querySelector('meta[name=_csrf]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name=_csrf_header]')?.getAttribute('content');
            
            const headers = {};
            if (csrfHeader && csrfToken) {
                headers[csrfHeader] = csrfToken;
            }
            
            fetch('/sys/upload', {
                method: 'POST',
                headers: headers,
                body: formData
            })
            .then(res => res.json())
            .then(result => {
                if (result.code === 0) {
                    this.avatarUrl = result.data;
                } else {
                    alert('上传失败: ' + result.msg);
                }
            })
            .catch(err => {
                console.error(err);
                alert('上传出错');
            });
        }
     }"
     @close-edit-modal.window="
        if (typeof isSubmitting !== 'undefined' && isSubmitting) {
            return;
        }
        if (typeof getIsDirty === 'function' && getIsDirty()) {
            if (!confirm('检测到您有未保存的修改，确定要直接关闭吗？')) {
                $event.stopImmediatePropagation();
                return;
            }
        }
     ">

    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200/80 dark:border-slate-800/80 p-6 md:p-8 space-y-6 max-w-4xl mx-auto">
        
        <!-- Header -->
        <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-5">
            <div class="flex items-center space-x-3.5">
                <div class="w-10 h-10 rounded-2xl bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center font-bold shadow-sm border border-indigo-100 dark:border-indigo-900/50">
                    <i class="w-5 h-5" data-lucide="user-cog"></i>
                </div>
                <div>
                    <h2 class="text-base font-bold text-slate-900 dark:text-white tracking-tight"
                        th:text="${manager.id == null ? '新增管理员账号' : '修改管理员个人资料'}">修改管理员个人资料</h2>
                    <p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">音书后台管理权限与账户基本信息维护</p>
                </div>
            </div>
        </div>
            
        <form th:hx-put="${manager.id != null} ? '/sys/manager' : null"
              th:hx-post="${manager.id == null} ? '/sys/manager' : null"
              hx-swap="none"
              class="space-y-6"
              @submit="isSubmitting = true">
              
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" id="altId" name="id" th:value="${manager.id}">
            <input type="hidden" id="ctm" th:value="${currentId}">

            <!-- Avatar Upload Section -->
            <div class="p-4 rounded-2xl bg-slate-50/80 dark:bg-slate-950/40 border border-slate-100 dark:border-slate-800/80 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <input type="hidden" name="avatar" th:value="${manager.avatar}" :value="avatarUrl">
                    <div class="relative group">
                        <img class="h-16 w-16 rounded-full object-cover ring-4 ring-indigo-500/10 dark:ring-indigo-500/20 shadow-md transition-transform group-hover:scale-105" 
                             :src="avatarUrl ? avatarUrl : '/images/avatar.jpg'" alt="Avatar Preview">
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-700 dark:text-slate-200">个人形象头像</span>
                        <span class="block text-[11px] text-slate-400 dark:text-slate-500 mt-0.5">支持 JPG、PNG 格式，系统自动裁剪最佳比例</span>
                    </div>
                </div>
                <label class="cursor-pointer inline-flex items-center space-x-1.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-2 text-xs font-bold text-slate-700 dark:text-slate-200 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-850 active:scale-95 transition-all">
                    <i class="w-3.5 h-3.5 text-indigo-600 dark:text-indigo-400" data-lucide="upload-cloud"></i>
                    <span>更换头像</span>
                    <input type="file" class="sr-only" accept="image/*" @change="uploadAvatar($event)">
                </label>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Username -->
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">用户名</label>
                    <input type="text" name="username" th:value="${manager.username}" required
                           th:readonly="${manager.id != null && manager.id != currentId}"
                           class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/60 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all placeholder-slate-400 disabled:opacity-60 readonly:bg-slate-100 dark:readonly:bg-slate-950/80" placeholder="请输入用户名">
                    <span class="text-[11px] text-indigo-600 dark:text-indigo-400 mt-1.5 block" th:if="${manager.id == null}">* 新增用户默认初始密码为：123456</span>
                </div>
                
                <!-- Real Name -->
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">真实姓名</label>
                    <input type="text" name="realName" th:value="${manager.realName}" required
                           class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/60 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all placeholder-slate-400" placeholder="请输入真实姓名">
                </div>

                <!-- Gender -->
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">性别</label>
                    <div class="flex items-center space-x-6 py-2">
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="gender" value="MAN"
                                   th:checked="${manager.gender == null || manager.gender.toString() == 'MAN'}"
                                   class="w-4 h-4 border-slate-300 dark:border-slate-700 text-indigo-600 focus:ring-indigo-500/20">
                            <span class="ml-2 text-xs font-semibold text-slate-700 dark:text-slate-200">男</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="gender" value="WOMAN"
                                   th:checked="${manager.gender != null && manager.gender.toString() == 'WOMAN'}"
                                   class="w-4 h-4 border-slate-300 dark:border-slate-700 text-indigo-600 focus:ring-indigo-500/20">
                            <span class="ml-2 text-xs font-semibold text-slate-700 dark:text-slate-200">女</span>
                        </label>
                    </div>
                </div>
                
                <!-- Birthday -->
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">出生日期</label>
                    <input type="date" name="birthday" th:value="${manager.birthday}"
                           class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/60 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all">
                </div>

                <!-- State -->
                <div th:if="${manager.state != null}">
                    <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">账户状态</label>
                    <!-- When not editing self, allow changing state -->
                    <select name="state" required th:if="${!#strings.equals(manager.id, currentId)}"
                            class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/60 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all">
                        <option value="INITIALIZE" th:disabled="${manager.state.toString() != 'INITIALIZE'}" th:selected="${manager.state.toString() == 'INITIALIZE'}">初始化</option>
                        <option value="NORMAL" th:disabled="${manager.state.toString() == 'INITIALIZE'}" th:selected="${manager.state.toString() == 'NORMAL'}">正常</option>
                        <option value="LOCKED" th:selected="${manager.state.toString() == 'LOCKED'}">封禁</option>
                    </select>
                    <!-- When editing self, state is read-only -->
                    <select name="state" required disabled th:if="${#strings.equals(manager.id, currentId)}"
                            class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/80 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all opacity-70">
                        <option value="INITIALIZE" th:selected="${manager.state.toString() == 'INITIALIZE'}">初始化</option>
                        <option value="NORMAL" th:selected="${manager.state.toString() == 'NORMAL'}">正常</option>
                        <option value="LOCKED" th:selected="${manager.state.toString() == 'LOCKED'}">封禁</option>
                    </select>
                    <input type="hidden" name="state" th:value="${manager.state}" th:if="${#strings.equals(manager.id, currentId)}" />
                </div>
            </div>

            <!-- Roles -->
            <div class="pt-2">
                <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">已分配角色</label>
                <!-- Not self: allow checking roles -->
                <div th:if="${!#strings.equals(manager.id, currentId)}" class="flex flex-wrap gap-4 p-4 rounded-2xl bg-slate-50/50 dark:bg-slate-950/30 border border-slate-100 dark:border-slate-800/60">
                    <label th:each="role : ${roles}" class="inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="roleIds" th:value="${role.id}"
                               th:checked="${#strings.contains(checkRoleId, role.id)}"
                               th:disabled="${not #strings.contains(optionRoles, role.id)}"
                               class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-indigo-600 focus:ring-indigo-500/20">
                        <span class="ml-2 text-xs font-semibold text-slate-700 dark:text-slate-200" th:text="${role.roleName}"></span>
                    </label>
                </div>
                <!-- Editing self: roles are read-only -->
                <div th:if="${#strings.equals(manager.id, currentId)}" class="flex flex-wrap gap-2">
                    <span th:each="role : ${manager.roleList}" 
                          class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-400 border border-indigo-200/60 dark:border-indigo-800/40 shadow-sm">
                        <i class="w-3 h-3 mr-1.5" data-lucide="shield-check"></i>
                        <span th:text="${role.roleName}"></span>
                        <input type="hidden" name="roleIds" th:value="${role.id}">
                    </span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="pt-6 flex items-center justify-end space-x-3 border-t border-slate-100 dark:border-slate-800">
                <a th:data-return-url="${manager.id != null && manager.id == currentId} ? '/home' : '/sys/manager.html'"
                   @click.prevent="
                     const inModal = document.querySelector('#editModalContent') && document.querySelector('#editModalContent').contains($el);
                     if (inModal) {
                       $dispatch('close-edit-modal');
                     } else {
                       const url = $el.dataset.returnUrl;
                       htmx.ajax('GET', url, { target: '#main-content', swap: 'innerHTML', pushUrl: url });
                     }
                   "
                   class="inline-flex justify-center items-center rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-5 py-2.5 text-xs font-bold text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-850 active:scale-95 transition-all cursor-pointer">
                    <i class="w-3.5 h-3.5 mr-1.5 text-slate-400" data-lucide="arrow-left"></i>
                    取消 / 返回
                </a>
                <button type="submit" @click="isSubmitting = true; openEdit = false"
                        class="inline-flex justify-center items-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-6 py-2.5 text-xs font-bold text-white shadow-md shadow-indigo-500/20 active:scale-95 transition-all"
                        th:text="${manager.id == null ? '保存管理员' : '保存修改'}">
                    保存修改
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
