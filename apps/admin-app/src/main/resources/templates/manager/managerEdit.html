<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理员编辑</title>
</head>
<body>
 
<div th:fragment="managerEditFragment" class="p-4"
     x-data="{
        avatarUrl: '[[${manager.avatar}]]',
        initialState: '',
        isSubmitting: false,
        getIsDirty() {
            const form = this.$el.querySelector('form');
            if (!form) return false;
            const current = new FormData(form);
            const serialized = Array.from(current.entries()).map(e => e[0] + '=' + e[1]).join('&');
            return this.initialState !== serialized;
        },
        init() {
            this.$nextTick(() => {
                const form = this.$el.querySelector('form');
                if (form) {
                    const current = new FormData(form);
                    this.initialState = Array.from(current.entries()).map(e => e[0] + '=' + e[1]).join('&');
                }
            });
        },
        uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('[[${_csrf.parameterName}]]', '[[${_csrf.token}]]');
            
            fetch('/sys/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(result => {
                if (result.code === 0) {
                    this.avatarUrl = result.data;
                } else {
                    alert('上传失败: ' + result.msg);
                }
            })
            .catch(err => {
                console.error(err);
                alert('上传出错');
            });
        }
     }"
     @close-edit-modal.window="
        if (openEdit) {
            if (isSubmitting) {
                openEdit = false;
                return;
            }
            if (getIsDirty()) {
                if (confirm('检测到您有未保存的修改，确定要直接关闭吗？')) {
                    openEdit = false;
                }
            } else {
                openEdit = false;
            }
        }
     ">
     
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4"
        th:text="${manager.id == null ? '新增管理员' : '修改管理员'}"></h3>
        
    <form th:hx-put="${manager.id != null} ? '/sys/manager' : null"
          th:hx-post="${manager.id == null} ? '/sys/manager' : null"
          hx-swap="none"
          class="space-y-4"
          @submit="isSubmitting = true">
          
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" id="altId" name="id" th:value="${manager.id}">
        <input type="hidden" id="ctm" th:value="${currentId}">
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">用户名</label>
            <input type="text" name="username" th:value="${manager.username}" required
                   th:readonly="${manager.id != null && manager.id != currentId}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm readonly:bg-gray-100 dark:readonly:bg-gray-800">
            <span class="text-xs text-gray-400 mt-1 block" th:if="${manager.id == null}">新增用户默认密码为：123456</span>
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">真实姓名</label>
            <input type="text" name="realName" th:value="${manager.realName}" required
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
 
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">性别</label>
            <div class="flex items-center space-x-4">
                <label class="inline-flex items-center">
                    <input type="radio" name="gender" value="MAN"
                           th:checked="${manager.gender == null || manager.gender.toString() == 'MAN'}"
                           class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-200">男</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="radio" name="gender" value="WOMAN"
                           th:checked="${manager.gender != null && manager.gender.toString() == 'WOMAN'}"
                           class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-200">女</span>
                </label>
            </div>
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">生日</label>
            <input type="date" name="birthday" th:value="${manager.birthday}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
 
        <div th:if="${manager.state != null}">
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">状态</label>
            <!-- When not editing self, allow changing state -->
            <select name="state" required th:if="${!#strings.equals(manager.id, currentId)}"
                    class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value="INITIALIZE" th:disabled="${manager.state.toString() != 'INITIALIZE'}" th:selected="${manager.state.toString() == 'INITIALIZE'}">初始化</option>
                <option value="NORMAL" th:disabled="${manager.state.toString() == 'INITIALIZE'}" th:selected="${manager.state.toString() == 'NORMAL'}">正常</option>
                <option value="LOCKED" th:selected="${manager.state.toString() == 'LOCKED'}">封禁</option>
            </select>
            <!-- When editing self, state is read-only -->
            <select name="state" required disabled th:if="${#strings.equals(manager.id, currentId)}"
                    class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-950 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm bg-gray-100">
                <option value="INITIALIZE" th:selected="${manager.state.toString() == 'INITIALIZE'}">初始化</option>
                <option value="NORMAL" th:selected="${manager.state.toString() == 'NORMAL'}">正常</option>
                <option value="LOCKED" th:selected="${manager.state.toString() == 'LOCKED'}">封禁</option>
            </select>
            <input type="hidden" name="state" th:value="${manager.state}" th:if="${#strings.equals(manager.id, currentId)}" />
        </div>
 
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">头像</label>
            <input type="hidden" name="avatar" :value="avatarUrl">
            <div class="flex items-center space-x-4">
                <img class="h-16 w-16 rounded-full object-cover border-2 border-gray-200 dark:border-gray-700" :src="avatarUrl ? avatarUrl : '/images/avatar.jpg'" alt="Avatar Preview">
                <label class="cursor-pointer bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-md px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700">
                    选择图片
                    <input type="file" class="sr-only" accept="image/*" @change="uploadAvatar($event)">
                </label>
            </div>
        </div>
 
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">角色</label>
            <!-- Not self: allow checking roles -->
            <div th:if="${!#strings.equals(manager.id, currentId)}" class="flex flex-wrap gap-4">
                <label th:each="role : ${roles}" class="inline-flex items-center">
                    <input type="checkbox" name="roleIds" th:value="${role.id}"
                           th:checked="${#strings.contains(checkRoleId, role.id)}"
                           th:disabled="${not #strings.contains(optionRoles, role.id)}"
                           class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-200" th:text="${role.roleName}"></span>
                </label>
            </div>
            <!-- Editing self: roles are read-only -->
            <div th:if="${#strings.equals(manager.id, currentId)}" class="flex flex-wrap gap-2">
                <span th:each="role : ${manager.roleList}" 
                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-700">
                    <span th:text="${role.roleName}"></span>
                    <input type="hidden" name="roleIds" th:value="${role.id}">
                </span>
            </div>
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="button" @click="$dispatch('close-edit-modal')"
                    class="rounded-md border border-gray-300 bg-white dark:bg-gray-800 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none">
                取消
            </button>
            <button type="submit" @click="isSubmitting = true; openEdit = false"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none"
                    th:text="${manager.id == null ? '保存' : '修改'}">
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
