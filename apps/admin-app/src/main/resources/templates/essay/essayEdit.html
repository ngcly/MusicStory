<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>文章审核</title>
</head>
<body>
 
<div th:fragment="essayEditFragment" class="p-4" x-data="{ state: '[[${essay.state}]]' }">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">文章审核</h3>
        
    <form hx-post="/ms/essay" 
          hx-swap="none"
          class="space-y-4">
          
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="id" th:value="${essay.id}">
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">文章标题</label>
            <input type="text" th:value="${essay.title}" readonly
                   class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 text-gray-500 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">状态</label>
            <select name="state" x-model="state" required
                    class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value="PENDING" th:selected="${essay.state.toString()=='PENDING'}">待审核</option>
                <option value="FORBIDDEN" th:selected="${essay.state.toString()=='FORBIDDEN'}">查封</option>
                <option value="NORMAL" th:selected="${essay.state.toString()=='NORMAL'}">正常</option>
                <option value="RECOMMEND" th:selected="${essay.state.toString()=='RECOMMEND'}">推荐</option>
            </select>
        </div>
        
        <div x-show="state === 'FORBIDDEN'" x-transition>
            <label class="block text-xs font-semibold text-gray-400 uppercase">原因说明</label>
            <input type="text" name="remark" th:value="${essay.remark}" placeholder="请填写查封原因"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="button" @click="openEdit = false"
                    class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                取消
            </button>
            <button type="submit" @click="openEdit = false"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                保存
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
