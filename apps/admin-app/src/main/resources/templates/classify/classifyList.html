<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>分类列表</title>
</head>
<body>
 
<div th:fragment="mainContent" class="p-6 space-y-6" x-data="{ openEdit: false }">
 
    <!-- Top Header Breadcrumb & Actions Bar -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight">分类管理</h1>
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">音书文章与内容分类架构维护</p>
        </div>
        <button class="p-2 rounded-xl border border-slate-200/80 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 hover:shadow-sm transition-all" 
                onclick="location.reload()" title="刷新">
            <i class="w-4 h-4" data-lucide="rotate-cw"></i>
        </button>
    </div>
 
    <!-- Search & Actions Row Container -->
    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200/80 dark:border-slate-800/80 p-5 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <form id="search-form" hx-get="/ms/classify.html" hx-target="#classifyTableContainer" hx-swap="outerHTML" class="flex flex-wrap items-end gap-4 flex-1">
            <div class="w-full md:w-64">
                <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">分类名</label>
                <input type="text" name="name" th:value="${classifyParam != null ? classifyParam.name : ''}"
                       class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/60 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all placeholder-slate-400" placeholder="搜索分类名...">
            </div>
            <div class="flex space-x-2">
                <button type="submit" class="inline-flex justify-center items-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-4 py-2.5 text-xs font-bold text-white shadow-md shadow-indigo-500/20 active:scale-95 transition-all">
                    <i class="w-3.5 h-3.5 mr-1.5" data-lucide="search"></i>
                    查询
                </button>
                <button type="reset" onclick="setTimeout(() => { document.querySelector('#search-form button[type=submit]').click(); }, 50)" class="inline-flex justify-center items-center rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-2.5 text-xs font-bold text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-850 active:scale-95 transition-all">
                    <i class="w-3.5 h-3.5 mr-1.5" data-lucide="rotate-ccw"></i>
                    重置
                </button>
            </div>
        </form>
        <div>
            <button sec:authorize="hasAuthority('POST_/ms/classify')"
                    hx-get="/ms/classify/edit.html" 
                    hx-target="#editModalContent"
                    @click="openEdit = true"
                    class="inline-flex justify-center items-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-4 py-2.5 text-xs font-bold text-white shadow-md shadow-indigo-500/20 active:scale-95 transition-all">
                <i class="w-4 h-4 mr-1.5" data-lucide="plus"></i>
                新增分类
            </button>
        </div>
    </div>
 
    <!-- Table Container Card -->
    <div id="classifyTableContainer" th:fragment="classifyTable"
         hx-trigger="classifyListChanged from:body" 
         hx-get="/ms/classify.html" 
         hx-include="#search-form" 
         hx-target="this" 
         hx-swap="outerHTML"
         class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200/80 dark:border-slate-800/80 overflow-hidden">
         
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-100 dark:divide-slate-800/80">
                <thead class="bg-slate-50/80 dark:bg-slate-950/50">
                    <tr>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">分类名</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">分类编码</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">排序</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">创建时间</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">更新时间</th>
                        <th class="px-6 py-4 text-right text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 dark:divide-slate-800/80 bg-white dark:bg-slate-900">
                    <tr th:each="c : ${classifyPage.content}" class="hover:bg-slate-50/80 dark:hover:bg-slate-850/50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-xs font-bold text-slate-800 dark:text-slate-200" th:text="${c.name}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400 font-mono" th:text="${c.code}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400 font-mono" th:text="${c.sort}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400" th:text="${#temporals.format(c.createdAt,'yyyy-MM-dd HH:mm:ss')}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400" th:text="${#temporals.format(c.updatedAt,'yyyy-MM-dd HH:mm:ss')}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-xs font-semibold space-x-2">
                            <button sec:authorize="hasAuthority('PUT_/ms/classify')"
                                    class="text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 font-bold"
                                    th:hx-get="'/ms/classify/edit.html?classifyId=' + ${c.id}" 
                                    hx-target="#editModalContent"
                                    @click="openEdit = true">
                                编辑
                            </button>
                            <button sec:authorize="hasAuthority('DELETE_/ms/classify')"
                                    class="text-rose-600 hover:text-rose-700 dark:text-rose-400 dark:hover:text-rose-300 font-bold"
                                    th:hx-delete="'/ms/classify?classifyId=' + ${c.id}"
                                    hx-confirm="确定要删除此分类吗？"
                                    hx-target="#classifyTableContainer"
                                    hx-swap="outerHTML">
                                删除
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(classifyPage.content)}">
                        <td colspan="6" class="px-6 py-12 text-center text-slate-500 dark:text-slate-400">
                            <div class="flex flex-col items-center justify-center space-y-2">
                                <i class="w-8 h-8 text-slate-300 dark:text-slate-600" data-lucide="inbox"></i>
                                <span class="text-xs">没有任何分类记录。</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
 
        <!-- Pagination -->
        <div class="bg-white dark:bg-slate-900 px-6 py-4 flex items-center justify-between border-t border-slate-100 dark:border-slate-800/80">
            <div class="flex-1 flex justify-between sm:hidden">
                <button th:if="${classifyPage.hasPrevious()}"
                        th:hx-get="'/ms/classify.html?page=' + ${currentPage - 1} + '&size=' + ${size}"
                        hx-include="#search-form"
                        hx-target="#classifyTableContainer"
                        hx-swap="outerHTML"
                        class="relative inline-flex items-center px-4 py-2 border border-slate-200 dark:border-slate-800 text-xs font-bold rounded-xl text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-850 transition-all">
                    上一页
                </button>
                <button th:if="${classifyPage.hasNext()}"
                        th:hx-get="'/ms/classify.html?page=' + ${currentPage + 1} + '&size=' + ${size}"
                        hx-include="#search-form"
                        hx-target="#classifyTableContainer"
                        hx-swap="outerHTML"
                        class="ml-3 relative inline-flex items-center px-4 py-2 border border-slate-200 dark:border-slate-800 text-xs font-bold rounded-xl text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-850 transition-all">
                    下一页
                </button>
            </div>
            <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                <div>
                    <p class="text-xs text-slate-500 dark:text-slate-400">
                        显示第 <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${(currentPage - 1) * size + 1}"></span> 至 
                        <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${(currentPage - 1) * size + classifyPage.numberOfElements}"></span> 条，
                        共 <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${classifyPage.totalElements}"></span> 条记录
                    </p>
                </div>
                <div>
                    <nav class="relative z-0 inline-flex rounded-xl shadow-sm -space-x-px border border-slate-200 dark:border-slate-800 overflow-hidden" aria-label="Pagination">
                        <button th:disabled="${!classifyPage.hasPrevious()}"
                                th:hx-get="${classifyPage.hasPrevious()} ? '/ms/classify.html?page=' + ${currentPage - 1} + '&size=' + ${size} : null"
                                hx-include="#search-form"
                                hx-target="#classifyTableContainer"
                                hx-swap="outerHTML"
                                class="relative inline-flex items-center px-3 py-2 bg-white dark:bg-slate-900 text-xs font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-850 disabled:opacity-40 transition-colors">
                            <i class="w-4 h-4" data-lucide="chevron-left"></i>
                        </button>
                        <button th:each="pageNum : ${#numbers.sequence(1, classifyPage.totalPages == 0 ? 1 : classifyPage.totalPages)}"
                                th:hx-get="'/ms/classify.html?page=' + ${pageNum} + '&size=' + ${size}"
                                hx-include="#search-form"
                                hx-target="#classifyTableContainer"
                                hx-swap="outerHTML"
                                th:classappend="${pageNum == currentPage} ? 'z-10 bg-indigo-50 dark:bg-indigo-950/40 border-indigo-500 text-indigo-600 dark:text-indigo-400' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-850'"
                                class="relative inline-flex items-center px-3.5 py-2 border-t border-b text-xs font-bold transition-all"
                                th:text="${pageNum}">
                        </button>
                        <button th:disabled="${!classifyPage.hasNext()}"
                                th:hx-get="${classifyPage.hasNext()} ? '/ms/classify.html?page=' + ${currentPage + 1} + '&size=' + ${size} : null"
                                hx-include="#search-form"
                                hx-target="#classifyTableContainer"
                                hx-swap="outerHTML"
                                class="relative inline-flex items-center px-3 py-2 bg-white dark:bg-slate-900 text-xs font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-850 disabled:opacity-40 transition-colors">
                            <i class="w-4 h-4" data-lucide="chevron-right"></i>
                        </button>
                    </nav>
                </div>
            </div>
        </div>
    </div>
 
    <!-- Edit Modal -->
    <div x-show="openEdit" 
         class="fixed inset-0 z-50 overflow-y-auto" 
         aria-labelledby="modal-title" role="dialog" aria-modal="true" style="display: none;">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="openEdit"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 class="fixed inset-0 bg-slate-950/60 backdrop-blur-md transition-opacity" 
                 @click="openEdit = false"></div>
 
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
 
            <div x-show="openEdit"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 class="inline-block align-middle bg-white dark:bg-slate-900 rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-slate-100 dark:border-slate-800">
                <div class="relative bg-white dark:bg-slate-900 p-6">
                    <button class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 p-1.5 rounded-xl transition-colors z-10" @click="openEdit = false">
                        <i class="w-5 h-5" data-lucide="x"></i>
                    </button>
                    <div id="editModalContent" class="mt-2">
                        <div class="flex justify-center p-12">
                            <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
</div>
 
</body>
</html>
