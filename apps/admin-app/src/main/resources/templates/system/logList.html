<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志列表</title>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.25);
            border-radius: 3px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen p-6">

<!-- Top Navigation Bar -->
<div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-4 mb-6">
    <nav class="flex" aria-label="Breadcrumb">
        <ol class="inline-flex items-center space-x-1 md:space-x-2">
            <li class="inline-flex items-center text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">系统设置</li>
            <li>
                <div class="flex items-center">
                    <svg class="w-3.5 h-3.5 text-slate-300 dark:text-slate-650 mx-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                    <span class="ml-1 text-sm font-bold text-slate-800 dark:text-slate-200">登录日志</span>
                </div>
            </li>
        </ol>
    </nav>
    <button class="p-2 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200/60 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700/80 text-slate-500 dark:text-slate-400 transition-colors" 
            onclick="location.reload()" title="刷新">
        <i class="w-4 h-4" data-lucide="refresh-cw"></i>
    </button>
</div>

<!-- Search Row -->
<div class="bg-white dark:bg-slate-855 rounded-2xl shadow-sm border border-slate-200/50 dark:border-slate-800/80 p-5 mb-6">
    <form id="search-form" hx-get="/sys/logs.html" hx-target="#logTableContainer" hx-swap="outerHTML" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 items-end">
        <div>
            <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">用户名</label>
            <input type="text" name="userName" th:value="${logParam != null ? logParam.userName : ''}"
                   class="mt-1.5 block w-full rounded-xl border-slate-200 dark:border-slate-750 dark:bg-slate-900/50 shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-100 dark:focus:ring-indigo-950/30 text-sm py-2 px-3 focus:outline-none transition-all placeholder-slate-400">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">用户类型</label>
            <select name="userType" 
                    class="mt-1.5 block w-full rounded-xl border-slate-200 dark:border-slate-750 dark:bg-slate-900/50 shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-100 dark:focus:ring-indigo-950/30 text-sm py-2 px-3 focus:outline-none transition-all">
                <option value=""></option>
                <option value="ADMIN" th:selected="${logParam != null && logParam.userType != null && logParam.userType.toString() == 'ADMIN'}">后台管理员</option>
                <option value="USER" th:selected="${logParam != null && logParam.userType != null && logParam.userType.toString() == 'USER'}">前台会员</option>
            </select>
        </div>
        <div class="flex space-x-2 sm:col-span-2">
            <button type="submit" class="inline-flex justify-center items-center rounded-xl bg-indigo-650 bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-750 focus:outline-none focus:ring-2 focus:ring-indigo-550 transition-colors w-full">
                <i class="w-4 h-4 mr-1.5" data-lucide="search"></i>
                查询
            </button>
            <button type="reset" onclick="setTimeout(() => { document.querySelector('#search-form button[type=submit]').click(); }, 50)" class="inline-flex justify-center items-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors w-full">
                <i class="w-4 h-4 mr-1.5" data-lucide="rotate-ccw"></i>
                重置
            </button>
        </div>
    </form>
</div>

<!-- Table Container -->
<div id="logTableContainer" th:fragment="logTable"
     class="bg-white dark:bg-slate-850 rounded-2xl shadow-sm border border-slate-200/50 dark:border-slate-800/80 overflow-hidden">
 
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-100 dark:divide-slate-800/60">
            <thead class="bg-slate-50/50 dark:bg-slate-900/40">
                <tr>
                    <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">用户名</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">用户类型</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">IP</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">地区</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">登录浏览器</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">登录状态</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">登录时间</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-150 dark:divide-slate-800/60 bg-white dark:bg-slate-850">
                <tr th:each="log : ${logPage.content}" class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors group">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-slate-900 dark:text-slate-100" th:text="${log.userName}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 dark:text-slate-400" th:text="${log.userType == 'ADMIN' ? '后台管理员' : '前台会员'}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-550 dark:text-slate-350" th:text="${log.loginIp}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 dark:text-slate-400 font-medium" th:text="${log.loginAddress != null && !log.loginAddress.isEmpty() ? log.loginAddress : '-'}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-550 dark:text-slate-350 text-xs" th:text="${log.loginBrowser}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <!-- Premium Status Badges -->
                        <span th:if="${log.loginStatus == 'success'}" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 dark:bg-emerald-950/30 dark:text-emerald-400 border border-emerald-250/20 dark:border-emerald-900/30">
                            <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            登录成功
                        </span>
                        <span th:unless="${log.loginStatus == 'success'}" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-rose-50 text-rose-700 dark:bg-rose-950/30 dark:text-rose-400 border border-rose-250/20 dark:border-rose-900/30">
                            <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-rose-500 animate-pulse"></span>
                            登录失败
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 dark:text-slate-450" th:text="${#temporals.format(log.loginTime,'yyyy-MM-dd HH:mm:ss')}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(logPage.content)}">
                    <td colspan="7" class="px-6 py-12 text-center text-slate-500 dark:text-slate-400">
                        <div class="flex flex-col items-center justify-center space-y-2">
                            <i class="w-8 h-8 text-slate-300 dark:text-slate-650" data-lucide="inbox"></i>
                            <span class="text-sm">目前没有任何登录日志。</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
 
    <!-- Pagination -->
    <div class="bg-white dark:bg-slate-850 px-6 py-4 flex items-center justify-between border-t border-slate-100 dark:divide-slate-800/60 dark:border-slate-800/60">
        <div class="flex-1 flex justify-between sm:hidden">
            <button th:if="${logPage.hasPrevious()}"
                    th:hx-get="'/sys/logs.html?page=' + ${currentPage - 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#logTableContainer"
                    hx-swap="outerHTML"
                    class="relative inline-flex items-center px-4 py-2 border border-slate-200 dark:border-slate-700 text-sm font-semibold rounded-xl text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
                上一页
            </button>
            <button th:if="${logPage.hasNext()}"
                    th:hx-get="'/sys/logs.html?page=' + ${currentPage + 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#logTableContainer"
                    hx-swap="outerHTML"
                    class="ml-3 relative inline-flex items-center px-4 py-2 border border-slate-200 dark:border-slate-700 text-sm font-semibold rounded-xl text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
                下一页
            </button>
        </div>
        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    当前显示第 <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${(currentPage - 1) * size + 1}"></span> 至 
                    <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${(currentPage - 1) * size + logPage.numberOfElements}"></span> 条，
                    共 <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${logPage.totalElements}"></span> 条记录
                </p>
            </div>
            <div>
                <nav class="relative z-0 inline-flex rounded-xl shadow-sm -space-x-px border border-slate-200 dark:border-slate-800 overflow-hidden" aria-label="Pagination">
                    <button th:disabled="${!logPage.hasPrevious()}"
                            th:hx-get="${logPage.hasPrevious()} ? '/sys/logs.html?page=' + ${currentPage - 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#logTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-3 py-2 bg-white dark:bg-slate-800 text-sm font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-750 disabled:opacity-40 transition-colors">
                        <i class="w-4 h-4" data-lucide="chevron-left"></i>
                    </button>
                    <button th:each="pageNum : ${#numbers.sequence(1, logPage.totalPages == 0 ? 1 : logPage.totalPages)}"
                            th:hx-get="'/sys/logs.html?page=' + ${pageNum} + '&size=' + ${size}"
                            hx-include="#search-form"
                            hx-target="#logTableContainer"
                            hx-swap="outerHTML"
                            th:classappend="${pageNum == currentPage} ? 'z-10 bg-indigo-50 dark:bg-indigo-950/30 border-indigo-500 dark:border-indigo-650 text-indigo-600 dark:text-indigo-400' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-750'"
                            class="relative inline-flex items-center px-4 py-2 border-t border-b text-sm font-bold transition-all"
                            th:text="${pageNum}">
                    </button>
                    <button th:disabled="${!logPage.hasNext()}"
                            th:hx-get="${logPage.hasNext()} ? '/sys/logs.html?page=' + ${currentPage + 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#logTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-3 py-2 bg-white dark:bg-slate-800 text-sm font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-750 disabled:opacity-40 transition-colors">
                        <i class="w-4 h-4" data-lucide="chevron-right"></i>
                    </button>
                </nav>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Lucide icons on page load
    lucide.createIcons();

    // Re-run Lucide icons creation after HTMX content swap
    document.body.addEventListener('htmx:afterSwap', function() {
        lucide.createIcons();
    });
</script>
</body>
</html>
