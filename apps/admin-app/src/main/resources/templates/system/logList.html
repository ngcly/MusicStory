<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>日志列表</title>
</head>
<body>
 
<div th:fragment="mainContent" class="p-6 space-y-6">
 
    <!-- Top Header Breadcrumb & Actions Bar -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight">系统日志监控</h1>
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">系统全量 HTTP 请求审计、耗时追踪与用户日志记录</p>
        </div>
        <button class="p-2 rounded-xl border border-slate-200/80 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 hover:shadow-sm transition-all" 
                onclick="location.reload()" title="刷新">
            <i class="w-4 h-4" data-lucide="rotate-cw"></i>
        </button>
    </div>
 
    <!-- Search Card Container -->
    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200/80 dark:border-slate-800/80 p-5">
        <form id="search-form" hx-get="/sys/logs.html" hx-target="#logTableContainer" hx-swap="outerHTML" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">操作账号</label>
                <input type="text" name="userName" th:value="${logParam != null ? logParam.userName : ''}"
                       class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/60 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all placeholder-slate-400" placeholder="检索操作人...">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">用户类型</label>
                <select name="userType" 
                        class="w-full rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-950/60 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 text-xs py-2.5 px-3.5 transition-all">
                    <option value=""></option>
                    <option value="ADMIN" th:selected="${logParam != null && logParam.userType != null && logParam.userType.toString() == 'ADMIN'}">后台管理员</option>
                    <option value="USER" th:selected="${logParam != null && logParam.userType != null && logParam.userType.toString() == 'USER'}">前台会员</option>
                </select>
            </div>
            <div class="flex space-x-2">
                <button type="submit" class="inline-flex justify-center items-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-4 py-2.5 text-xs font-bold text-white shadow-md shadow-indigo-500/20 active:scale-95 transition-all w-full">
                    <i class="w-3.5 h-3.5 mr-1.5" data-lucide="search"></i>
                    查询
                </button>
                <button type="reset" onclick="setTimeout(() => { document.querySelector('#search-form button[type=submit]').click(); }, 50)" class="inline-flex justify-center items-center rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-2.5 text-xs font-bold text-slate-700 dark:text-slate-300 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-850 active:scale-95 transition-all w-full">
                    <i class="w-3.5 h-3.5 mr-1.5" data-lucide="rotate-ccw"></i>
                    重置
                </button>
            </div>
        </form>
    </div>
 
    <!-- Log Table Container Card -->
    <div id="logTableContainer" th:fragment="logTable"
         hx-trigger="logListChanged from:body" 
         hx-get="/sys/logs.html" 
         hx-include="#search-form" 
         hx-target="this" 
         hx-swap="outerHTML"
         class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200/80 dark:border-slate-800/80 overflow-hidden">
        
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-100 dark:divide-slate-800/80">
                <thead class="bg-slate-50/80 dark:bg-slate-950/50">
                    <tr>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">操作账号</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">操作IP</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">登录状态</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">登录地址</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">浏览器</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">用户类型</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">登录时间</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 dark:divide-slate-800/80 bg-white dark:bg-slate-900">
                    <tr th:each="log : ${logPage.content}" class="hover:bg-slate-50/80 dark:hover:bg-slate-850/50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-xs font-bold text-slate-800 dark:text-slate-200" th:text="${log.userName}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400 font-mono" th:text="${log.loginIp}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs">
                            <span class="px-2 py-0.5 rounded text-[11px] font-mono font-bold"
                                  th:classappend="${log.loginStatus.toString() == 'SUCCESS' ? 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400 border border-emerald-200/60 dark:border-emerald-800/40' : 'bg-rose-50 text-rose-700 dark:bg-rose-950/40 dark:text-rose-400 border border-rose-200/60 dark:border-rose-800/40'}"
                                  th:text="${log.loginStatus.toString() == 'SUCCESS' ? '成功' : '失败'}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400" th:text="${log.loginAddress}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400" th:text="${log.loginBrowser}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-semibold"
                                  th:classappend="${log.userType.toString() == 'ADMIN'} 
                                    ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-400 border border-indigo-200/60 dark:border-indigo-800/40' 
                                    : 'bg-sky-50 text-sky-700 dark:bg-sky-950/40 dark:text-sky-400 border border-sky-200/60 dark:border-sky-800/40'"
                                  th:text="${log.userType.toString() == 'ADMIN' ? '后台管理员' : '前台会员'}">
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400 font-mono" th:text="${#temporals.format(log.loginTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(logPage.content)}">
                        <td colspan="7" class="px-6 py-12 text-center text-slate-500 dark:text-slate-400">
                            <div class="flex flex-col items-center justify-center space-y-2">
                                <i class="w-8 h-8 text-slate-300 dark:text-slate-600" data-lucide="inbox"></i>
                                <span class="text-xs">未找到相关的系统日志。</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
 
        <!-- Pagination -->
        <div class="bg-white dark:bg-slate-900 px-6 py-4 flex items-center justify-between border-t border-slate-100 dark:border-slate-800/80">
            <div class="flex-1 flex justify-between sm:hidden">
                <button th:if="${logPage.hasPrevious()}"
                        th:hx-get="'/sys/logs.html?page=' + ${currentPage - 1} + '&size=' + ${size}"
                        hx-include="#search-form"
                        hx-target="#logTableContainer"
                        hx-swap="outerHTML"
                        class="relative inline-flex items-center px-4 py-2 border border-slate-200 dark:border-slate-800 text-xs font-bold rounded-xl text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-850 transition-all">
                    上一页
                </button>
                <button th:if="${logPage.hasNext()}"
                        th:hx-get="'/sys/logs.html?page=' + ${currentPage + 1} + '&size=' + ${size}"
                        hx-include="#search-form"
                        hx-target="#logTableContainer"
                        hx-swap="outerHTML"
                        class="ml-3 relative inline-flex items-center px-4 py-2 border border-slate-200 dark:border-slate-800 text-xs font-bold rounded-xl text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-850 transition-all">
                    下一页
                </button>
            </div>
            <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                <div>
                    <p class="text-xs text-slate-500 dark:text-slate-400">
                        显示第 <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${(currentPage - 1) * size + 1}"></span> 至 
                        <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${(currentPage - 1) * size + logPage.numberOfElements}"></span> 条，
                        共 <span class="font-bold text-slate-800 dark:text-slate-200" th:text="${logPage.totalElements}"></span> 条记录
                    </p>
                </div>
                <div>
                    <nav class="relative z-0 inline-flex rounded-xl shadow-sm -space-x-px border border-slate-200 dark:border-slate-800 overflow-hidden" aria-label="Pagination">
                        <button th:disabled="${!logPage.hasPrevious()}"
                                th:hx-get="${logPage.hasPrevious()} ? '/sys/logs.html?page=' + ${currentPage - 1} + '&size=' + ${size} : null"
                                hx-include="#search-form"
                                hx-target="#logTableContainer"
                                hx-swap="outerHTML"
                                class="relative inline-flex items-center px-3 py-2 bg-white dark:bg-slate-900 text-xs font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-850 disabled:opacity-40 transition-colors">
                            <i class="w-4 h-4" data-lucide="chevron-left"></i>
                        </button>
                        <button th:each="pageNum : ${#numbers.sequence(1, logPage.totalPages == 0 ? 1 : logPage.totalPages)}"
                                th:hx-get="'/sys/logs.html?page=' + ${pageNum} + '&size=' + ${size}"
                                hx-include="#search-form"
                                hx-target="#logTableContainer"
                                hx-swap="outerHTML"
                                th:classappend="${pageNum == currentPage} ? 'z-10 bg-indigo-50 dark:bg-indigo-950/40 border-indigo-500 text-indigo-600 dark:text-indigo-400' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-850'"
                                class="relative inline-flex items-center px-3.5 py-2 border-t border-b text-xs font-bold transition-all"
                                th:text="${pageNum}">
                        </button>
                        <button th:disabled="${!logPage.hasNext()}"
                                th:hx-get="${logPage.hasNext()} ? '/sys/logs.html?page=' + ${currentPage + 1} + '&size=' + ${size} : null"
                                hx-include="#search-form"
                                hx-target="#logTableContainer"
                                hx-swap="outerHTML"
                                class="relative inline-flex items-center px-3 py-2 bg-white dark:bg-slate-900 text-xs font-semibold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-850 disabled:opacity-40 transition-colors">
                            <i class="w-4 h-4" data-lucide="chevron-right"></i>
                        </button>
                    </nav>
                </div>
            </div>
        </div>
    </div>
 
</div>
 
</body>
</html>
