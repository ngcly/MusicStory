<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志列表</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen p-6">
 
<!-- Top Navigation Bar -->
<div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-800 pb-4 mb-6">
    <nav class="flex" aria-label="Breadcrumb">
        <ol class="inline-flex items-center space-x-1 md:space-x-3">
            <li class="inline-flex items-center text-gray-500">系统设置</li>
            <li>
                <div class="flex items-center">
                    <svg class="w-3 h-3 text-gray-400 mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
                    </svg>
                    <span class="ml-1 text-sm font-semibold text-gray-800 dark:text-white">登录日志</span>
                </div>
            </li>
        </ol>
    </nav>
    <button class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-500" 
            onclick="location.reload()" title="刷新">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
    </button>
</div>
 
<!-- Search Row -->
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 mb-6">
    <form id="search-form" hx-get="/sys/logs.html" hx-target="#logTableContainer" hx-swap="outerHTML" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">用户名</label>
            <input type="text" name="userName" th:value="${logParam != null ? logParam.userName : ''}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">用户类型</label>
            <select name="userType" 
                    class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value=""></option>
                <option value="ADMIN" th:selected="${logParam != null && logParam.userType != null && logParam.userType.toString() == 'ADMIN'}">后台管理员</option>
                <option value="USER" th:selected="${logParam != null && logParam.userType != null && logParam.userType.toString() == 'USER'}">前台会员</option>
            </select>
        </div>
        <div class="flex space-x-2 md:col-span-2">
            <button type="submit" class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 w-full">
                查询
            </button>
            <button type="reset" class="inline-flex justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 w-full">
                重置
            </button>
        </div>
    </form>
</div>
 
<!-- Table Container -->
<div id="logTableContainer" th:fragment="logTable"
     class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
 
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-900">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">用户名</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">用户类型</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">IP</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">地区</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">登录浏览器</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">登录状态</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">登录时间</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700 bg-white dark:bg-gray-800">
            <tr th:each="log : ${logPage.content}" class="hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white" th:text="${log.userName}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${log.userType == 'ADMIN' ? '后台管理员' : '前台会员'}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-550 dark:text-gray-300" th:text="${log.loginIp}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${log.loginAddress != null && !log.loginAddress.isEmpty() ? log.loginAddress : '-'}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${log.loginBrowser}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                          th:classappend="${log.loginStatus == 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}"
                          th:text="${log.loginStatus == 'success' ? '登录成功' : '登录失败'}">
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${#temporals.format(log.loginTime,'yyyy-MM-dd HH:mm:ss')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(logPage.content)}">
                <td colspan="7" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
                    目前没有任何登录日志。
                </td>
            </tr>
        </tbody>
    </table>
 
    <!-- Pagination -->
    <div class="bg-white dark:bg-gray-800 px-4 py-3 flex items-center justify-between border-t border-gray-200 dark:border-gray-700 sm:px-6">
        <div class="flex-1 flex justify-between sm:hidden">
            <button th:if="${logPage.hasPrevious()}"
                    th:hx-get="'/sys/logs.html?page=' + ${currentPage - 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#logTableContainer"
                    hx-swap="outerHTML"
                    class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                上一页
            </button>
            <button th:if="${logPage.hasNext()}"
                    th:hx-get="'/sys/logs.html?page=' + ${currentPage + 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#logTableContainer"
                    hx-swap="outerHTML"
                    class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                下一页
            </button>
        </div>
        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-gray-700 dark:text-gray-300">
                    当前显示第 <span class="font-medium" th:text="${(currentPage - 1) * size + 1}"></span> 至 
                    <span class="font-medium" th:text="${(currentPage - 1) * size + logPage.numberOfElements}"></span> 条，
                    共 <span class="font-medium" th:text="${logPage.totalElements}"></span> 条记录
                </p>
            </div>
            <div>
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-1" aria-label="Pagination">
                    <button th:disabled="${!logPage.hasPrevious()}"
                            th:hx-get="${logPage.hasPrevious()} ? '/sys/logs.html?page=' + ${currentPage - 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#logTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <button th:each="pageNum : ${#numbers.sequence(1, logPage.totalPages == 0 ? 1 : logPage.totalPages)}"
                            th:hx-get="'/sys/logs.html?page=' + ${pageNum} + '&size=' + ${size}"
                            hx-include="#search-form"
                            hx-target="#logTableContainer"
                            hx-swap="outerHTML"
                            th:classappend="${pageNum == currentPage} ? 'z-10 bg-indigo-50 border-indigo-500 text-indigo-600' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'"
                            class="relative inline-flex items-center px-4 py-2 border text-sm font-medium"
                            th:text="${pageNum}">
                    </button>
                    <button th:disabled="${!logPage.hasNext()}"
                            th:hx-get="${logPage.hasNext()} ? '/sys/logs.html?page=' + ${currentPage + 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#logTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </nav>
            </div>
        </div>
    </div>
</div>
 
</body>
</html>
