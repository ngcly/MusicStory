<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮播图</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen p-6"
      x-data="{ openCategory: false, openEdit: false }">
 
<!-- Top Navigation Bar -->
<div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-800 pb-4 mb-6">
    <nav class="flex" aria-label="Breadcrumb">
        <ol class="inline-flex items-center space-x-1 md:space-x-3">
            <li class="inline-flex items-center text-gray-500">音书管理</li>
            <li>
                <div class="flex items-center">
                    <svg class="w-3 h-3 text-gray-400 mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
                    </svg>
                    <span class="ml-1 text-sm font-semibold text-gray-800 dark:text-white">轮播图列表</span>
                </div>
            </li>
        </ol>
    </nav>
    <button class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-500" 
            onclick="location.reload()" title="刷新">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
    </button>
</div>
 
<!-- Search & Actions Row -->
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-4 mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
    <form id="search-form" hx-get="/ms/carousel.html" hx-target="#carouselTableContainer" hx-swap="outerHTML" class="flex flex-wrap items-end gap-4 flex-1">
        <div class="w-full md:w-64">
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">标题</label>
            <input type="text" name="name" th:value="${nameParam != null ? nameParam : ''}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div class="flex space-x-2">
            <button type="submit" class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                查询
            </button>
            <button type="reset" class="inline-flex justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                重置
            </button>
        </div>
    </form>
    <div>
        <button sec:authorize="hasAuthority('POST_/ms/carousel')"
                hx-get="/ms/carousel/category/edit.html" 
                hx-target="#categoryModalContent"
                @click="openCategory = true"
                class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            <svg class="-ml-1 mr-2 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
            新增轮播分类
        </button>
    </div>
</div>
 
<!-- Table Container -->
<div id="carouselTableContainer" th:fragment="carouselTable"
     hx-trigger="carouselListChanged from:body" 
     hx-get="/ms/carousel.html" 
     hx-include="#search-form" 
     hx-target="this" 
     hx-swap="outerHTML"
     class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
 
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-900">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">标识</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">标题</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">备注</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">图片预览</th>
                <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">操作</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700 bg-white dark:bg-gray-800">
            <tr th:each="cc : ${carouselPage.content}" class="hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white" th:text="${cc.id}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${cc.title}"></td>
                <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-300" th:text="${cc.remark}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    <div class="flex space-x-1 overflow-x-auto max-w-md">
                        <img th:each="img : ${cc.carousels}" th:src="${img.imageUrl}" th:alt="${img.imageTip}"
                             class="h-8 w-12 object-cover rounded shadow-sm border border-gray-200 dark:border-gray-700">
                        <span th:if="${#lists.isEmpty(cc.carousels)}" class="text-xs text-gray-400">暂无图片</span>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                    <button class="text-indigo-600 hover:text-indigo-900"
                            th:hx-get="'/ms/carousel/category/edit.html?id=' + ${cc.id}" 
                            hx-target="#categoryModalContent"
                            @click="openCategory = true">
                        编辑分类
                    </button>
                    <button class="text-indigo-600 hover:text-indigo-900"
                            th:hx-get="'/ms/carousel/edit.html?id=' + ${cc.id}" 
                            hx-target="#editModalContent"
                            @click="openEdit = true">
                        编辑图片
                    </button>
                    <button class="text-red-600 hover:text-red-900"
                            th:hx-delete="'/ms/carousel/category?id=' + ${cc.id}"
                            hx-confirm="确定删除整个分类及图集吗？"
                            hx-target="closest tr"
                            hx-swap="outerHTML"
                            th:hx-headers="'{&quot;X-CSRF-TOKEN&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
                        删除
                    </button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(carouselPage.content)}">
                <td colspan="5" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
                    未找到相关的轮播分类。
                </td>
            </tr>
        </tbody>
    </table>
 
    <!-- Pagination -->
    <div class="bg-white dark:bg-gray-800 px-4 py-3 flex items-center justify-between border-t border-gray-200 dark:border-gray-700 sm:px-6">
        <div class="flex-1 flex justify-between sm:hidden">
            <button th:if="${carouselPage.hasPrevious()}"
                    th:hx-get="'/ms/carousel.html?page=' + ${currentPage - 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#carouselTableContainer"
                    hx-swap="outerHTML"
                    class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                上一页
            </button>
            <button th:if="${carouselPage.hasNext()}"
                    th:hx-get="'/ms/carousel.html?page=' + ${currentPage + 1} + '&size=' + ${size}"
                    hx-include="#search-form"
                    hx-target="#carouselTableContainer"
                    hx-swap="outerHTML"
                    class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                下一页
            </button>
        </div>
        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-gray-700 dark:text-gray-300">
                    当前显示第 <span class="font-medium" th:text="${(currentPage - 1) * size + 1}"></span> 至 
                    <span class="font-medium" th:text="${(currentPage - 1) * size + carouselPage.numberOfElements}"></span> 条，
                    共 <span class="font-medium" th:text="${carouselPage.totalElements}"></span> 条记录
                </p>
            </div>
            <div>
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-1" aria-label="Pagination">
                    <button th:disabled="${!carouselPage.hasPrevious()}"
                            th:hx-get="${carouselPage.hasPrevious()} ? '/ms/carousel.html?page=' + ${currentPage - 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#carouselTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <button th:each="pageNum : ${#numbers.sequence(1, carouselPage.totalPages == 0 ? 1 : carouselPage.totalPages)}"
                            th:hx-get="'/ms/carousel.html?page=' + ${pageNum} + '&size=' + ${size}"
                            hx-include="#search-form"
                            hx-target="#carouselTableContainer"
                            hx-swap="outerHTML"
                            th:classappend="${pageNum == currentPage} ? 'z-10 bg-indigo-55 bg-indigo-50 border-indigo-500 text-indigo-600' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'"
                            class="relative inline-flex items-center px-4 py-2 border text-sm font-medium"
                            th:text="${pageNum}">
                    </button>
                    <button th:disabled="${!carouselPage.hasNext()}"
                            th:hx-get="${carouselPage.hasNext()} ? '/ms/carousel.html?page=' + ${currentPage + 1} + '&size=' + ${size} : null"
                            hx-include="#search-form"
                            hx-target="#carouselTableContainer"
                            hx-swap="outerHTML"
                            class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </nav>
            </div>
        </div>
    </div>
</div>
 
<!-- Category Modal -->
<div x-show="openCategory" 
     class="fixed inset-0 z-50 overflow-y-auto" 
     aria-labelledby="modal-title" role="dialog" aria-modal="true" style="display: none;">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div x-show="openCategory"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" 
             @click="openCategory = false"></div>
 
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
 
        <div x-show="openCategory"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="inline-block align-middle bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="flex items-center justify-between border-b pb-3 mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="modal-title">轮播图分类</h3>
                    <button class="text-gray-400 hover:text-gray-600" @click="openCategory = false">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="categoryModalContent">
                    <div class="flex justify-center p-6">
                        <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
 
<!-- Images Edit Modal -->
<div x-show="openEdit" 
     class="fixed inset-0 z-50 overflow-y-auto" 
     aria-labelledby="modal-title" role="dialog" aria-modal="true" style="display: none;">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div x-show="openEdit"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" 
             @click="openEdit = false"></div>
 
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
 
        <div x-show="openEdit"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="inline-block align-middle bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full">
            <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="flex items-center justify-between border-b pb-3 mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="modal-title">图片列表管理</h3>
                    <button class="text-gray-400 hover:text-gray-600" @click="openEdit = false; htmx.trigger('body', 'carouselListChanged')">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="editModalContent">
                    <div class="flex justify-center p-6">
                        <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
 
</body>
</html>
