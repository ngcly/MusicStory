<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>编辑轮播图</title>
</head>
<body>
 
<div th:fragment="carouselEditFragment" class="p-4 space-y-6" id="editModalContent"
     hx-trigger="carouselImagesChanged from:body" 
     th:hx-get="'/ms/carousel/edit.html?id=' + ${carouselCategory.id}"
     hx-target="this" 
     hx-swap="outerHTML">
 
    <!-- Section 1: Upload Image -->
    <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-lg border border-gray-200 dark:border-gray-800">
        <h4 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">添加图片至图集</h4>
        <form hx-encoding="multipart/form-data" 
              hx-post="/ms/carousel"
              hx-swap="none" 
              class="flex flex-col md:flex-row items-stretch md:items-center gap-3">
            <input type="hidden" name="id" th:value="${carouselCategory.id}" />
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
            <div class="flex-1">
                <input type="file" name="file" required 
                       class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 dark:file:bg-indigo-900/50 dark:file:text-indigo-300" />
            </div>
            <button type="submit" 
                    class="inline-flex justify-center items-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                上传图片
            </button>
        </form>
    </div>
 
    <!-- Section 2: Edit Form -->
    <form hx-post="/ms/carousel/category" 
          hx-swap="none"
          class="space-y-4">
        
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" id="cid" name="id" th:value="${carouselCategory.id}">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase">标识符</label>
                <input type="text" th:value="${carouselCategory.id}" readonly
                       class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 text-gray-500 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase">分类标题</label>
                <input type="text" name="title" th:value="${carouselCategory.title}" required
                       class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">描述/备注</label>
            <input type="text" name="remark" th:value="${carouselCategory.remark}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
 
        <!-- Image list table -->
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">图集管理</label>
            <div class="border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden bg-white dark:bg-gray-800">
                <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                    <thead class="bg-gray-50 dark:bg-gray-900">
                        <tr>
                            <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider w-20">排序</th>
                            <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider w-24">缩略图</th>
                            <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">图片提示 (Tip)</th>
                            <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">跳转链接</th>
                            <th class="px-4 py-2 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider w-20">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                        <tr th:each="carousel,carouselStat:${carouselCategory.carousels}">
                            <!-- Nested Thymeleaf Binding -->
                            <input type="hidden" th:name="'carousels['+${carouselStat.index}+'].id'" th:value="${carousel.id}">
                            <input type="hidden" th:name="'carousels['+${carouselStat.index}+'].imageUrl'" th:value="${carousel.imageUrl}">
                            
                            <td class="px-4 py-2 whitespace-nowrap">
                                <input type="number" name="sort" th:name="'carousels['+${carouselStat.index}+'].sort'" th:value="${carousel.sort}" required
                                       class="block w-16 rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm text-center">
                            </td>
                            <td class="px-4 py-2 whitespace-nowrap">
                                <img th:src="${carousel.imageUrl}" th:alt="${carousel.imageTip}"
                                     class="h-10 w-16 object-cover rounded shadow-sm border border-gray-200 dark:border-gray-700">
                            </td>
                            <td class="px-4 py-2">
                                <input type="text" name="imageTip" th:name="'carousels['+${carouselStat.index}+'].imageTip'" th:value="${carousel.imageTip}" placeholder="提示信息"
                                       class="block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                            </td>
                            <td class="px-4 py-2">
                                <input type="text" name="forwardUrl" th:name="'carousels['+${carouselStat.index}+'].forwardUrl'" th:value="${carousel.forwardUrl}" placeholder="跳转地址"
                                       class="block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                            </td>
                            <td class="px-4 py-2 whitespace-nowrap text-right text-sm font-medium">
                                <button type="button" class="text-red-600 hover:text-red-900"
                                        th:hx-delete="'/ms/carousel?id=' + ${carousel.id} + '&url=' + ${carousel.imageUrl}"
                                        hx-confirm="确定从该图集中删除此图片吗？"
                                        hx-swap="none">
                                    删除
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(carouselCategory.carousels)}">
                            <td colspan="5" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">
                                暂无图片，请在上方选择并上传新图片。
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="button" @click="openEdit = false; htmx.trigger('body', 'carouselListChanged')"
                    class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                关闭
            </button>
            <button type="submit" @click="openEdit = false; htmx.trigger('body', 'carouselListChanged')"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                保存修改
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
