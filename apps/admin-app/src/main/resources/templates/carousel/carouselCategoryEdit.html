<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑轮播图分类</title>
</head>
<body>
 
<div th:fragment="carouselCategoryEditFragment" class="p-4">
    <form hx-post="/ms/carousel/category" 
          hx-swap="none"
          class="space-y-4">
          
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">标题</label>
            <input type="text" name="title" th:value="${carouselCategory.title}" required placeholder="请输入标题"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">唯一标识符</label>
            <input type="text" name="id" th:value="${carouselCategory.id}" th:readonly="${carouselCategory.id != null}" required placeholder="请输入唯一标识符"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm readonly:bg-gray-50 readonly:text-gray-500">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">描述/备注</label>
            <input type="text" name="remark" th:value="${carouselCategory.remark}" placeholder="描述内容"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="button" @click="openCategory = false"
                    class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                取消
            </button>
            <button type="submit" @click="openCategory = false"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                    th:text="${carouselCategory.id == null ? '保存' : '修改'}">
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
