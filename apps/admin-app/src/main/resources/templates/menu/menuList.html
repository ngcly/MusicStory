<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单列表</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.25);
            border-radius: 3px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen p-6"
      x-data="{ openEdit: false }">
 
<!-- Top Navigation Bar -->
<div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-800 pb-4 mb-6">
    <nav class="flex" aria-label="Breadcrumb">
        <ol class="inline-flex items-center space-x-1 md:space-x-3">
            <li class="inline-flex items-center text-gray-500">系统设置</li>
            <li>
                <div class="flex items-center">
                    <svg class="w-3 h-3 text-gray-400 mx-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
                    </svg>
                    <span class="ml-1 text-sm font-semibold text-gray-800 dark:text-white">菜单列表</span>
                </div>
            </li>
        </ol>
    </nav>
    <button class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-500" 
            onclick="location.reload()" title="刷新">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
    </button>
</div>
 
<!-- Actions Row -->
<div class="mb-6 flex justify-between items-center">
    <div>
        <button sec:authorize="hasAuthority('POST_/sys/menu')"
                hx-get="/sys/menu/edit.html" 
                hx-target="#editModalContent"
                @click="openEdit = true"
                class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            <svg class="-ml-1 mr-2 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
            新增菜单
        </button>
    </div>
</div>
 
<!-- Table Container -->
<div id="menuTableContainer" th:fragment="menuTable"
     hx-trigger="menuListChanged from:body" 
     hx-get="/sys/menu.html" 
     hx-target="this" 
     hx-swap="outerHTML"
     class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden"
     x-data="{
        expandedIds: [],
        parentMap: {},
        init() {
            const list = window.menuList || [];
            list.forEach(m => {
                this.parentMap[m.id] = m.parentId;
                if (String(m.parentId) === '0' || m.parentId === 0) {
                    if (!this.expandedIds.includes(m.id)) {
                        this.expandedIds.push(m.id);
                    }
                }
            });
        },
        isRowVisible(parentId) {
            if (parentId === 0 || parentId === '0') return true;
            if (!this.expandedIds.includes(Number(parentId)) && !this.expandedIds.includes(String(parentId))) return false;
            const grandparentId = this.parentMap[parentId];
            return this.isRowVisible(grandparentId);
        },
        toggleRow(menuId) {
            const id = Number(menuId);
            if (this.expandedIds.includes(id)) {
                this.expandedIds = this.expandedIds.filter(x => x !== id);
            } else {
                this.expandedIds.push(id);
            }
        },
        isExpanded(menuId) {
            return this.expandedIds.includes(Number(menuId));
        },
        getDepth(parentId) {
            if (parentId === 0 || parentId === '0') return 0;
            const nextParent = this.parentMap[parentId];
            return 1 + this.getDepth(nextParent);
        }
     }">
     
    <script th:inline="javascript">
        window.menuList = [[${menuList}]];
    </script>
 
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-900">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">菜单名称</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">权限标识</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">链接地址</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">菜单类型</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">菜单图标</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">排序</th>
                <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">操作</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700 bg-white dark:bg-gray-800">
            <tr th:each="menu : ${menuList}" 
                th:attr="x-show=|isRowVisible('${menu.parentId}')|"
                class="hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                
                <!-- Indented name cell with toggle button -->
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white flex items-center"
                    th:attr=":style=|'padding-left: ' + (getDepth('${menu.parentId}') * 1.5 + 1.5) + 'rem'|">
                    
                    <!-- Toggle Chevron -->
                    <button type="button" th:attr="@click=|toggleRow('${menu.id}')|"
                            class="mr-1.5 text-gray-400 hover:text-gray-600 focus:outline-none"
                            th:unless="${#strings.equals(menu.resourceType,'button')}">
                        <svg class="h-4 w-4 transform transition-transform" th:attr=":class=|isExpanded('${menu.id}') ? 'rotate-90' : ''|" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <!-- Spacer for buttons that don't have chevron -->
                    <div class="w-4 h-4 mr-1.5" th:if="${#strings.equals(menu.resourceType,'button')}"></div>
                    
                    <span th:text="${menu.name}"></span>
                </td>
                
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-550 dark:text-gray-300" th:text="${menu.httpMethod != null ? menu.httpMethod : '-'}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${menu.url != null && !menu.url.isEmpty() ? menu.url : '-'}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                          th:classappend="${menu.resourceType == 'menu' ? 'bg-indigo-100 text-indigo-800' : 'bg-gray-100 text-gray-800'}"
                          th:text="${menu.resourceType == 'menu' ? '菜单' : '按钮'}">
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-550 dark:text-gray-300">
                    <i class="w-5 h-5" th:data-lucide="${menu.icon != null && !menu.icon.isEmpty() ? menu.icon : 'help-circle'}"></i>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300" th:text="${menu.sort}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                    <button sec:authorize="hasAuthority('POST_/sys/menu')"
                            class="text-indigo-650 text-indigo-650 hover:text-indigo-900"
                            th:unless="${#strings.equals(menu.resourceType,'button')}"
                            th:hx-get="'/sys/menu/edit.html?parentId=' + ${menu.id}" 
                            hx-target="#editModalContent"
                            @click="openEdit = true">
                        添加子菜单
                    </button>
                    <button sec:authorize="hasAuthority('PUT_/sys/menu')"
                            class="text-indigo-600 hover:text-indigo-900"
                            th:hx-get="'/sys/menu/edit.html?menuId=' + ${menu.id}" 
                            hx-target="#editModalContent"
                            @click="openEdit = true">
                        编辑
                    </button>
                    <button class="text-red-600 hover:text-red-900"
                            th:hx-delete="'/sys/menu?menuId=' + ${menu.id}"
                            hx-confirm="确定删除该菜单及所有子项吗？"
                            hx-swap="none"
                            th:hx-headers="'{&quot;X-CSRF-TOKEN&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
                        删除
                    </button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(menuList)}">
                <td colspan="7" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
                    没有任何菜单记录。
                </td>
            </tr>
        </tbody>
    </table>
</div>
 
<!-- Edit Modal -->
<div x-show="openEdit" 
     class="fixed inset-0 z-50 overflow-y-auto" 
     aria-labelledby="modal-title" role="dialog" aria-modal="true" style="display: none;">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div x-show="openEdit"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" 
             @click="openEdit = false"></div>
 
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
 
        <div x-show="openEdit"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="inline-block align-middle bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="flex items-center justify-between border-b pb-3 mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="modal-title">菜单管理</h3>
                    <button class="text-gray-400 hover:text-gray-600" @click="openEdit = false">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="editModalContent">
                    <div class="flex justify-center p-6">
                        <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
 
<script>
    // Initialize Lucide icons on load
    lucide.createIcons();
    
    // Re-run Lucide icons creation after HTMX swaps
    document.body.addEventListener('htmx:afterSwap', function() {
        lucide.createIcons();
    });
</script>
</body>
</html>
