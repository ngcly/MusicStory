<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>菜单列表</title>
</head>
<body>
 
<div th:fragment="mainContent" class="p-6 space-y-6" x-data="{ openEdit: false }">
 
    <!-- Top Header Breadcrumb & Actions Bar -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight">菜单管理</h1>
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">配置系统层级菜单树、权限标识与路由关联</p>
        </div>
        <button class="p-2 rounded-xl border border-slate-200/80 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 hover:shadow-sm transition-all" 
                onclick="location.reload()" title="刷新">
            <i class="w-4 h-4" data-lucide="rotate-cw"></i>
        </button>
    </div>
 
    <!-- Table Header Toolbar -->
    <div class="flex justify-between items-center px-1">
        <div class="text-xs font-semibold text-slate-500 dark:text-slate-400">
            层级菜单树结构
        </div>
        <div>
            <button sec:authorize="hasAuthority('POST_/sys/menu')"
                    hx-get="/sys/menu/edit.html" 
                    hx-target="#editModalContent"
                    hx-swap="innerHTML"
                    @click="openEdit = true"
                    class="inline-flex justify-center items-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 px-4 py-2.5 text-xs font-bold text-white shadow-md shadow-indigo-500/20 active:scale-95 transition-all">
                <i class="w-4 h-4 mr-1.5" data-lucide="plus"></i>
                新增顶级菜单
            </button>
        </div>
    </div>
 
    <!-- Menu Tree Table Container Card -->
    <div id="menuTableContainer" th:fragment="menuTable"
         hx-trigger="menuListChanged from:body" 
         hx-get="/sys/menu.html" 
         hx-target="this" 
         hx-swap="outerHTML"
         class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200/80 dark:border-slate-800/80 overflow-hidden"
         x-data="{
            expandedIds: [],
            parentMap: {},
            init() {
                this.$nextTick(() => {
                    const rows = this.$el.querySelectorAll('tbody tr');
                    rows.forEach(tr => {
                        const menuId = tr.dataset.menuId;
                        const parentId = tr.dataset.parentId;
                        if (menuId) {
                            this.parentMap[menuId] = parentId;
                        }
                    });
                    
                    rows.forEach(tr => {
                        const menuId = Number(tr.dataset.menuId);
                        const parentId = tr.dataset.parentId;
                        if (parentId === '0' || parentId === 0 || parentId === null || parentId === undefined) {
                            if (!this.expandedIds.includes(menuId)) {
                                this.expandedIds.push(menuId);
                            }
                        }
                    });
                });
            },
            isRowVisible(parentId) {
                if (!parentId || parentId === 0 || parentId === '0') return true;
                if (!this.expandedIds.includes(Number(parentId)) && !this.expandedIds.includes(String(parentId))) return false;
                const grandparentId = this.parentMap[parentId];
                if (grandparentId === undefined || grandparentId === null || grandparentId === parentId) return true;
                return this.isRowVisible(grandparentId);
            },
            toggleRow(menuId) {
                const id = Number(menuId);
                if (this.expandedIds.includes(id)) {
                    this.expandedIds = this.expandedIds.filter(x => x !== id);
                } else {
                    this.expandedIds.push(id);
                }
            },
            isExpanded(menuId) {
                return this.expandedIds.includes(Number(menuId));
            },
            getDepth(parentId) {
                if (!parentId || parentId === 0 || parentId === '0') return 0;
                const nextParent = this.parentMap[parentId];
                if (nextParent === undefined || nextParent === null || nextParent === parentId) return 0;
                return 1 + this.getDepth(nextParent);
            }
         }">
         
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-100 dark:divide-slate-800/80">
                <thead class="bg-slate-50/80 dark:bg-slate-950/50">
                    <tr>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">菜单名称</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">请求方法</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">链接地址</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">菜单类型</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">图标</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">排序</th>
                        <th class="px-6 py-4 text-right text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 dark:divide-slate-800/80 bg-white dark:bg-slate-900">
                    <tr th:each="menu : ${permissionList}" 
                        th:data-menu-id="${menu.id}"
                        th:data-parent-id="${menu.parentId}"
                        x-show="isRowVisible($el.dataset.parentId)"
                        class="hover:bg-slate-50/80 dark:hover:bg-slate-850/50 transition-colors">
                        
                        <!-- Indented name cell with toggle button & alignment guide lines -->
                        <td class="px-6 py-4 whitespace-nowrap text-xs font-bold text-slate-800 dark:text-slate-200 flex items-center">
                            <!-- Tree indentation vertical guide lines -->
                            <div class="flex items-center shrink-0">
                                <template x-for="(d, idx) in Array.from({length: getDepth($el.closest('tr').dataset.parentId)})">
                                    <div class="h-8 border-l border-slate-200/80 dark:border-slate-800 w-5"></div>
                                </template>
                            </div>
 
                            <!-- Toggle Chevron -->
                            <button type="button" @click="toggleRow($el.closest('tr').dataset.menuId)"
                                    class="mr-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 focus:outline-none shrink-0 transition-transform duration-200"
                                    th:unless="${#strings.equalsIgnoreCase(menu.resourceType, 'BUTTON')}">
                                <svg class="h-4 w-4 transform transition-transform duration-200" 
                                     :class="isExpanded($el.closest('tr').dataset.menuId) ? 'rotate-90 text-indigo-500' : ''" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                                </svg>
                            </button>
                            <!-- Spacer for buttons that don't have chevron -->
                            <div class="w-4 h-4 mr-2 shrink-0" th:if="${#strings.equalsIgnoreCase(menu.resourceType, 'BUTTON')}"></div>
                            
                            <span th:text="${menu.name}"></span>
                        </td>
                        
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400 font-mono" th:text="${menu.httpMethod != null ? menu.httpMethod : '-'}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400" th:text="${menu.url != null && !menu.url.isEmpty() ? menu.url : '-'}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-semibold"
                                  th:classappend="${menu.resourceType != null && (#strings.equalsIgnoreCase(menu.resourceType.name(), 'MENU') || #strings.equalsIgnoreCase(menu.resourceType, 'MENU'))} 
                                    ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-400 border border-indigo-200/60 dark:border-indigo-800/40' 
                                    : 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 border border-slate-200/60 dark:border-slate-700/40'"
                                  th:text="${menu.resourceType != null && (#strings.equalsIgnoreCase(menu.resourceType.name(), 'MENU') || #strings.equalsIgnoreCase(menu.resourceType, 'MENU')) ? '菜单' : '按钮'}">
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400">
                            <i class="w-4 h-4" th:data-lucide="${menu.icon != null && !menu.icon.isEmpty() ? menu.icon : 'help-circle'}"></i>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500 dark:text-slate-400" th:text="${menu.sort}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-xs font-semibold space-x-2">
                            <button sec:authorize="hasAuthority('POST_/sys/menu')"
                                    class="text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 font-bold"
                                    th:unless="${#strings.equalsIgnoreCase(menu.resourceType, 'BUTTON')}"
                                    th:hx-get="@{/sys/menu/edit.html(parentId=${menu.id})}" 
                                    hx-target="#editModalContent"
                                    hx-swap="innerHTML"
                                    @click="openEdit = true">
                                添加子菜单
                            </button>
                            <button sec:authorize="hasAuthority('PUT_/sys/menu')"
                                    class="text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 font-bold"
                                    th:hx-get="@{/sys/menu/edit.html(menuId=${menu.id})}" 
                                    hx-target="#editModalContent"
                                    hx-swap="innerHTML"
                                    @click="openEdit = true">
                                编辑
                            </button>
                            <button class="text-rose-600 hover:text-rose-700 dark:text-rose-400 dark:hover:text-rose-300 font-bold"
                                    th:hx-delete="'/sys/menu?menuId=' + ${menu.id}"
                                    hx-confirm="确定要删除此菜单吗？"
                                    hx-swap="none">
                                删除
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(permissionList)}">
                        <td colspan="7" class="px-6 py-12 text-center text-slate-500 dark:text-slate-400">
                            <div class="flex flex-col items-center justify-center space-y-2">
                                <i class="w-8 h-8 text-slate-300 dark:text-slate-600" data-lucide="inbox"></i>
                                <span class="text-xs">没有任何菜单记录。</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
 
    <!-- Edit Modal -->
    <div x-show="openEdit" 
         class="fixed inset-0 z-50 overflow-y-auto" 
         @keydown.escape.window="$dispatch('close-edit-modal')"
         @close-edit-modal.window="openEdit = false"
         aria-labelledby="modal-title" role="dialog" aria-modal="true" style="display: none;">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="openEdit"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 class="fixed inset-0 bg-slate-950/60 backdrop-blur-md transition-opacity" 
                 @click="$dispatch('close-edit-modal')"></div>
 
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
 
            <div x-show="openEdit"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 class="inline-block align-middle bg-white dark:bg-slate-900 rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-slate-100 dark:border-slate-800">
                <div class="relative bg-white dark:bg-slate-900 p-6">
                    <button class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 p-1.5 rounded-xl transition-colors z-10" @click="$dispatch('close-edit-modal')">
                        <i class="w-5 h-5" data-lucide="x"></i>
                    </button>
                    <div id="editModalContent" class="mt-2">
                        <div class="flex justify-center p-12">
                            <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
</div>
 
</body>
</html>
