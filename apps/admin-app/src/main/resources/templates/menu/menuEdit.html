<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>菜单编辑</title>
</head>
<body>
 
<div th:fragment="menuEditFragment" class="p-4"
     x-data="{
        resourceType: '[[${menu.resourceType != null ? menu.resourceType : 'menu'}]]',
        initialState: '',
        isSubmitting: false,
        getIsDirty() {
            const form = this.$el.querySelector('form');
            if (!form) return false;
            const current = new FormData(form);
            const serialized = Array.from(current.entries()).map(e => e[0] + '=' + e[1]).join('&');
            return this.initialState !== serialized;
        },
        init() {
            this.$nextTick(() => {
                const form = this.$el.querySelector('form');
                if (form) {
                    const current = new FormData(form);
                    this.initialState = Array.from(current.entries()).map(e => e[0] + '=' + e[1]).join('&');
                }
            });
        }
     }"
     @close-edit-modal.window="
        if (openEdit) {
            if (isSubmitting) {
                openEdit = false;
                return;
            }
            if (getIsDirty()) {
                if (confirm('检测到您有未保存的修改，确定要直接关闭吗？')) {
                    openEdit = false;
                }
            } else {
                openEdit = false;
            }
        }
     ">
     
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4"
        th:text="${menu.id == null ? '新增菜单' : '修改菜单'}"></h3>
        
    <form th:hx-put="${menu.id != null} ? '/sys/menu' : null"
          th:hx-post="${menu.id == null} ? '/sys/menu' : null"
          hx-swap="none"
          class="space-y-4"
          @submit="isSubmitting = true">
          
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="id" th:value="${menu.id}">
        <input type="hidden" name="parentId" th:value="${menu.parentId != null ? menu.parentId : 0}" />
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">菜单名</label>
            <input type="text" name="name" th:value="${menu.name}" required
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">请求方法</label>
            <input type="text" name="httpMethod" th:value="${menu.httpMethod}" required placeholder="GET|POST|PUT|DELETE"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            <span class="text-xs text-gray-400 mt-1 block">接口请求的HTTP方法，如：GET|POST</span>
        </div>
 
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">资源类型</label>
            <div class="flex items-center space-x-4">
                <label class="inline-flex items-center">
                    <input type="radio" name="resourceType" value="menu" x-model="resourceType"
                           class="h-4 w-4 border-gray-300 text-indigo-650 focus:ring-indigo-500">
                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-200">菜单</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="radio" name="resourceType" value="button" x-model="resourceType"
                           class="h-4 w-4 border-gray-300 text-indigo-650 focus:ring-indigo-500">
                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-200">按钮</span>
                </label>
            </div>
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">父级菜单</label>
            <input type="text" th:value="${parentName == null || parentName.isEmpty() ? '顶层菜单' : parentName}" readonly
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-800 text-gray-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">跳转地址</label>
            <input type="text" name="url" th:value="${menu.url}" placeholder="如：/sys/menu.html"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
 
        <div x-show="resourceType === 'menu'">
            <label class="block text-xs font-semibold text-gray-400 uppercase">图标 (Thyme / FontAwesome)</label>
            <input type="text" name="icon" th:value="${menu.icon}" placeholder="如：&#xe608;"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            <span class="text-xs text-gray-400 mt-1 block">只在菜单级别展示</span>
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase">排序</label>
            <input type="number" name="sort" th:value="${menu.sort}" required min="0"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 dark:bg-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
 
        <div class="pt-4 flex justify-end space-x-2 border-t border-gray-100 dark:border-gray-700">
            <button type="button" @click="$dispatch('close-edit-modal')"
                    class="rounded-md border border-gray-300 bg-white dark:bg-gray-800 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none">
                取消
            </button>
            <button type="submit" @click="isSubmitting = true; openEdit = false"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none"
                    th:text="${menu.id == null ? '保存' : '修改'}">
            </button>
        </div>
    </form>
</div>
 
</body>
</html>
